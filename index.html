<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Global Cinema Empire</title>
    <style>
        :root { --red: #E50914; --black: #050505; --card: #181818; }
        body { background: var(--black); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Premium Navbar */
        nav { background: rgba(0,0,0,0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 2000; border-bottom: 2px solid var(--red); box-sizing: border-box; }
        .logo { color: var(--red); font-size: 2.2rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; text-shadow: 0 0 15px var(--red); }

        /* Search Hero Section */
        .hero { padding: 120px 5% 40px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #050505); border-bottom: 8px solid #222; }
        .search-engine { display: flex; max-width: 800px; margin: 20px auto; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        #query { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; font-size: 1.1rem; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 40px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .s-btn:hover { background: white; color: var(--red); }

        /* Content Rails */
        .row { padding: 30px 0 0 5%; }
        .row h2 { font-size: 1.6rem; margin-bottom: 20px; border-left: 6px solid var(--red); padding-left: 15px; text-transform: uppercase; }
        .rail { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 40px; scrollbar-width: none; }
        .rail::-webkit-scrollbar { display: none; }
        
        /* Card Architecture */
        .card { flex: 0 0 180px; height: 270px; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.5s; cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.15); z-index: 100; border-color: white; box-shadow: 0 15px 50px rgba(0,0,0,0.9); }
        .card img { width: 100%; height: 100%; object-fit: cover; background: #111; }
        .badge { position: absolute; top: 12px; right: 12px; background: var(--red); font-size: 0.65rem; padding: 4px 10px; font-weight: bold; border-radius: 4px; }

        /* Global Theater */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 25px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); z-index: 10001; box-sizing: border-box; }
        .exit-btn { background: var(--red); color: white; border: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 0 20px var(--red); }
        iframe { width: 100%; height: 100%; border: none; padding-top: 60px; box-sizing: border-box; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">SPk ULTIMATE</a></nav>

<div class="hero">
    <h1>Global 4K Premium Cinema</h1>
    <div class="search-engine">
        <input type="text" id="query" placeholder="Explore 1 Million+ Content Worldwide...">
        <button class="s-btn" onclick="masterSearch()">SEARCH</button>
    </div>
</div>

<div class="content">
    <div class="row" id="s-row" style="display:none;"><h2>Search Results</h2><div class="rail" id="s-rail"></div></div>
    
    <div class="row">
        <h2 style="color: #ff4d4d;">🔞 Global Adult Hot (18+)</h2>
        <div class="rail" id="adult-rail"></div>
    </div>

    <div class="row">
        <h2 style="color: gold;">🌍 Trending Blockbusters</h2>
        <div class="rail" id="movie-rail"></div>
    </div>

    <div class="row">
        <h2>📺 Top Web Series</h2>
        <div class="rail" id="tv-rail"></div>
    </div>
</div>

<div id="theater">
    <div class="t-header">
        <span id="p-title" style="font-weight: 900; color: var(--red); text-transform: uppercase;">Streaming UHD</span>
        <button class="exit-btn" onclick="closeT()">✕ EXIT</button>
    </div>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    // ADVANCED: Bypass Proxy for Images
    const PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 
    let activeID = ""; let activeTYP = "";

    async function loadContent(url, railId) {
        const rail = document.getElementById(railId);
        try {
            const res = await fetch(url);
            const data = await res.json();
            data.results.forEach(m => {
                if(m.poster_path) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => launch(m.id, m.media_type || (railId==='tv-rail'?'tv':'movie'), m.title || m.name);
                    card.innerHTML = `<div class="badge">4K</div><img src="${PROXY + m.poster_path}" loading="lazy">`;
                    rail.appendChild(card);
                }
            });
        } catch(e) {}
    }

    function masterSearch() {
        const q = document.getElementById('query').value;
        if(!q) return;
        document.getElementById('s-rail').innerHTML = "";
        document.getElementById('s-row').style.display = "block";
        loadContent(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`, 's-rail');
        window.scrollTo({top: 400, behavior: 'smooth'});
    }

    function launch(id, type, name) {
        window.open(ADS, '_blank'); 
        activeID = id; activeTYP = type;
        document.getElementById('p-title').innerText = "PLAYING: " + name;
        document.getElementById('theater').style.display = "block";
        
        // India-Stable High-Speed Server
        document.getElementById('v-frame').src = `https://vidsrc.pro/embed/${activeTYP}/${activeID}`;
    }

    function closeT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => {
        loadContent(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749&sort_by=popularity.desc`, 'adult-rail');
        loadContent(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`, 'movie-rail');
        loadContent(`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}`, 'tv-rail');
    };
</script>
</body>
</html>
