<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk CINEMA - Premium 4K Streaming</title>
    <style>
        :root { --red: #E50914; --black: #080808; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; text-align: center; }
        
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

        /* Search Section */
        .search-area { padding: 60px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://image.tmdb.org/t/p/original/69Uqt7vS68p1EBYI7913o9W4mJ7.jpg'); background-size: cover; background-position: center; }
        .search-wrapper { display: flex; max-width: 550px; margin: 0 auto; background: #111; border: 2px solid var(--red); border-radius: 50px; overflow: hidden; box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }
        #s-box { flex: 1; padding: 15px 20px; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        .s-button { background: var(--red); color: white; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .s-button:hover { background: white; color: black; }

        /* Content Display */
        .row { padding: 40px 5% 0; text-align: left; }
        .row h2 { font-size: 1.4rem; border-left: 5px solid var(--red); padding-left: 15px; margin-bottom: 25px; text-transform: uppercase; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; min-height: 100px; }
        
        .card { background: #1a1a1a; border-radius: 10px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid #222; position: relative; }
        .card:hover { transform: scale(1.1); border-color: var(--red); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-info { padding: 12px; font-size: 0.8rem; text-align: center; font-weight: bold; }
        .tag { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.6rem; padding: 3px 6px; border-radius: 4px; font-weight: bold; }

        /* Theater Player Overlay */
        #theater-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .theater-nav { position: absolute; top: 20px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .exit-btn { background: var(--red); color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav><div class="logo" onclick="location.reload()">SPk CINEMA</div></nav>

<div class="search-area">
    <h1 style="margin-bottom: 20px; font-size: 2.2rem; text-shadow: 2px 2px 10px #000;">ULTIMATE STREAMING</h1>
    <div class="search-wrapper">
        <input type="text" id="s-box" placeholder="Search for Movies or Series...">
        <button class="s-button" onclick="performAction()">SEARCH</button>
    </div>
</div>

<div class="row" id="search-section" style="display:none;">
    <h2 id="section-label" style="color:var(--red)">Search Results</h2>
    <div class="movie-grid" id="search-results"></div>
</div>

<div class="row">
    <h2>Trending Worldwide</h2>
    <div class="movie-grid" id="trending-grid">
        </div>
</div>

<div id="theater-overlay">
    <div class="theater-nav">
        <span id="p-title" style="font-weight: 900; color: var(--red); text-shadow: 0 0 10px #000;">STREAMING IN 4K</span>
        <button class="exit-btn" onclick="shutPlayer()">✕ EXIT CINEMA</button>
    </div>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const ADS_LINK = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    const IMG_URL = "https://image.tmdb.org/t/p/w500";

    // 1. Professional Search Action
    async function performAction() {
        const query = document.getElementById('s-box').value;
        const grid = document.getElementById('search-results');
        const section = document.getElementById('search-section');

        if(query.length < 2) {
            alert("Please enter a movie or series name!");
            return;
        }

        section.style.display = "block";
        grid.innerHTML = "<p style='padding:20px; width: 100%;'>Searching database... Please wait.</p>";
        
        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            grid.innerHTML = ""; // Clear loader
            
            if(!data.results || data.results.length === 0) {
                grid.innerHTML = "<p style='padding:20px; width: 100%;'>No results found. Try a different title.</p>";
                return;
            }

            data.results.forEach(m => {
                if(m.poster_path) {
                    grid.appendChild(createCard(m));
                }
            });
            
            window.scrollTo({ top: 450, behavior: 'smooth' });

        } catch (error) {
            console.error("Fetch Error:", error);
            alert("Connection error. Please try again.");
        }
    }

    // 2. Card Creation Engine
    function createCard(m) {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => playNow(m.id, m.media_type || 'movie', m.title || m.name);
        card.innerHTML = `
            <div class="tag">4K UHD</div>
            <img src="${IMG_URL + m.poster_path}" loading="lazy">
            <div class="card-info">${m.title || m.name}</div>
        `;
        return card;
    }

    // 3. Player Launch with Earnings Ad
    function playNow(id, type, name) {
        alert("Preparing 4K Cinematic Stream for: " + name + "\nConnecting to Secure Global Server...");
        window.open(ADS_LINK, '_blank'); 

        setTimeout(() => {
            const player = document.getElementById('theater-overlay');
            const frame = document.getElementById('video-frame');
            document.getElementById('p-title').innerText = "STREAMING: " + name;
            
            let src = (type === 'tv') ? `https://vidsrc.to/embed/tv/${id}` : `https://vidsrc.to/embed/movie/${id}`;
            frame.src = src;
            player.style.display = "block";
        }, 1500);
    }

    function shutPlayer() {
        document.getElementById('theater-overlay').style.display = "none";
        document.getElementById('video-frame').src = "";
    }

    // 4. Initial Load (Trending)
    window.onload = async () => {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`);
            const data = await res.json();
            const grid = document.getElementById('trending-grid');
            data.results.forEach(m => {
                if(m.poster_path) {
                    grid.appendChild(createCard(m));
                }
            });
        } catch(e) {
            console.log("Initialization Failed");
        }
    }
</script>

</body>
</html>
