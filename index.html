<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - VPN Free Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E50914; --black: #050505; --card-bg: #111; }
        body { font-family: 'Outfit', sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 2000; }
        .logo { color: var(--red); font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; }

        .search-container { padding: 40px 5%; background: linear-gradient(to bottom, #111, #000); text-align: center; }
        .s-bar { display: flex; max-width: 600px; margin: 0 auto; background: #222; border-radius: 5px; border: 1px solid #444; }
        #query { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; }

        .row { padding: 20px 5%; }
        .row h2 { font-size: 1.2rem; border-left: 4px solid var(--red); padding-left: 12px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: scale(1.05); border-color: var(--red); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-name { padding: 8px; font-size: 0.75rem; text-align: center; font-weight: bold; }

        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: var(--red); color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav><div class="logo">SPk ULTIMATE</div></nav>

<div class="search-container">
    <div class="s-bar">
        <input type="text" id="query" placeholder="Search Movie (Netflix, Disney, Worldwide)...">
        <button class="s-btn" onclick="startSearch()">SEARCH</button>
    </div>
</div>

<div class="row" id="s-row" style="display:none;">
    <h2 style="color:var(--red)">Results</h2>
    <div class="grid" id="s-grid"></div>
</div>

<div class="row">
    <h2>Worldwide Trending</h2>
    <div class="grid" id="trending-grid"></div>
</div>

<div id="theater">
    <button class="close-btn" onclick="exitTheater()">✕ CLOSE</button>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    
    // --- NO-VPN PROXY IMAGE SYSTEM ---
    const PROXY = "https://images.weserv.nl/?url="; 

    async function loadGrid(url, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "<p>Loading 4K Posters...</p>";
        try {
            const res = await fetch(url);
            const data = await res.json();
            grid.innerHTML = "";
            data.results.forEach(m => {
                if(m.poster_path) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => playMovie(m.id, m.media_type || 'movie', m.title || m.name);
                    // Proxy applied to images to bypass India Ban
                    const imgUrl = `${PROXY}https://image.tmdb.org/t/p/w342${m.poster_path}`;
                    card.innerHTML = `<img src="${imgUrl}"><div class="card-name">${m.title || m.name}</div>`;
                    grid.appendChild(card);
                }
            });
        } catch(e) { grid.innerHTML = "<p>Server Busy. Refresh Page.</p>"; }
    }

    function startSearch() {
        const q = document.getElementById('query').value;
        if(q.length < 2) return;
        document.getElementById('s-row').style.display = "block";
        loadGrid(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`, 's-grid');
    }

    function playMovie(id, type, name) {
        alert("Establishing Secure Connection for: " + name);
        window.open(ADS, '_blank');
        const theater = document.getElementById('theater');
        const frame = document.getElementById('video-frame');
        frame.src = type === 'tv' ? `https://vidsrc.to/embed/tv/${id}` : `https://vidsrc.to/embed/movie/${id}`;
        theater.style.display = "block";
    }

    function exitTheater() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-frame').src = "";
    }

    window.onload = () => loadGrid(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`, 'trending-grid');
</script>

</body>
</html>
