<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - 18+ Global Cinema</title>
    <style>
        :root { --red: #E50914; --black: #050505; --card-bg: #111; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Netflix Style Nav */
        nav { background: rgba(0,0,0,0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 2000; border-bottom: 2px solid var(--red); box-sizing: border-box; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; cursor: pointer; }
        .nav-items { display: flex; gap: 20px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .nav-items span { cursor: pointer; transition: 0.3s; }
        .nav-items span:hover { color: var(--red); }

        /* Search Hero */
        .hero { padding: 120px 5% 40px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #000); }
        .search-bar { display: flex; max-width: 700px; margin: 20px auto; background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #444; }
        #s-input { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; }

        /* Rows */
        .row { padding: 30px 0 0 5%; }
        .row h2 { font-size: 1.4rem; margin-bottom: 15px; border-left: 5px solid var(--red); padding-left: 15px; text-transform: uppercase; }
        .scroll-grid { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 25px; scroll-behavior: smooth; }
        .scroll-grid::-webkit-scrollbar { display: none; }
        
        /* Cards */
        .card { flex: 0 0 160px; height: 240px; background: var(--card-bg); border-radius: 8px; overflow: hidden; position: relative; transition: 0.4s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: var(--red); box-shadow: 0 10px 40px #000; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .tag { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.6rem; padding: 3px 7px; font-weight: bold; border-radius: 4px; }

        /* Theater Player */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-nav { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; background: linear-gradient(rgba(0,0,0,0.8), transparent); }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 30px; font-weight: bold; cursor: pointer; border-radius: 50px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.reload()">SPk ULTIMATE</div>
    <div class="nav-items">
        <span onclick="fetchGenre(10749, 'Premium 18+ Hot & Adult')">🔞 18+ Shows</span>
        <span onclick="loadGrid('https://api.themoviedb.org/3/trending/tv/week?api_key=844dba0bfd443a56f92d74a0d0d88b03', 'main-grid')">Web Series</span>
        <span onclick="fetchGenre(28, 'Action Blockbusters')">Movies</span>
    </div>
</nav>

<div class="hero">
    <div class="search-bar">
        <input type="text" id="s-input" placeholder="Search Worldwide Movies, Adult Webseries, 18+ Content...">
        <button class="s-btn" onclick="masterSearch()">SEARCH</button>
    </div>
</div>

<div class="row" id="search-row" style="display:none;">
    <h2 id="s-label" style="color: var(--red);">Search Results</h2>
    <div class="scroll-grid" id="search-grid"></div>
</div>

<div class="row">
    <h2 style="color: #ff4d4d;">🔥 Hot & Adult Trending (18+)</h2>
    <div class="scroll-grid" id="hot-grid"></div>
</div>

<div class="row">
    <h2 id="main-label">Worldwide Trending Movies</h2>
    <div class="scroll-grid" id="main-grid"></div>
</div>

<div class="row">
    <h2>Popular Worldwide Series</h2>
    <div class="scroll-grid" id="tv-grid"></div>
</div>

<div id="theater">
    <div class="t-nav">
        <span id="playing-now" style="font-weight: bold; color: var(--red);">STREAMING 4K ULTRA HD</span>
        <button class="close-btn" onclick="closeTheater()">✕ CLOSE THEATER</button>
    </div>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const PROXY = "https://images.weserv.nl/?url="; // Anti-Block Image Proxy
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 

    async function loadGrid(url, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "<p style='padding:20px;'>Accessing Global Database...</p>";
        try {
            const res = await fetch(url);
            const data = await res.json();
            grid.innerHTML = "";
            data.results.forEach(m => {
                if(m.poster_path) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openTheater(m.id, m.media_type || 'movie', m.title || m.name);
                    const poster = `${PROXY}https://image.tmdb.org/t/p/w342${m.poster_path}`;
                    card.innerHTML = `<div class="tag">18+</div><img src="${poster}">`;
                    grid.appendChild(card);
                }
            });
        } catch(e) { grid.innerHTML = "<p>Connection Error. Refresh Page.</p>"; }
    }

    function masterSearch() {
        const q = document.getElementById('s-input').value;
        if(q.length < 2) return;
        document.getElementById('search-row').style.display = "block";
        loadGrid(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`, 'search-grid');
        window.scrollTo({ top: 350, behavior: 'smooth' });
    }

    function fetchGenre(id, label) {
        document.getElementById('main-label').innerText = label;
        loadGrid(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}&sort_by=popularity.desc`, 'main-grid');
    }

    function openTheater(id, type, name) {
        window.open(ADS, '_blank'); // Earnings
        const theater = document.getElementById('theater');
        const frame = document.getElementById('video-frame');
        document.getElementById('playing-now').innerText = "STREAMING: " + name;
        
        // India-Friendly Direct Servers
        frame.src = type === 'tv' ? `https://vidsrc.me/embed/tv?imdb=${id}` : `https://vidsrc.me/embed/movie?imdb=${id}`;
        theater.style.display = "block";
    }

    function closeTheater() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-frame').src = "";
    }

    window.onload = () => {
        // Load Trending Movies
        loadGrid(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`, 'main-grid');
        // Load Specific Adult/Romance for the Hot section
        loadGrid(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749&sort_by=popularity.desc`, 'hot-grid');
        // Load TV Series
        loadGrid(`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}`, 'tv-grid');
    };
</script>

</body>
</html>
