<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Guaranteed Netflix Experience</title>
    <style>
        :root { --red: #E50914; --black: #050505; --gray: #141414; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Netflix Navigation */
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; }

        /* Powerful Local Search */
        .hero { padding: 40px 5%; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #000); }
        .search-box { display: flex; max-width: 600px; margin: 0 auto; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        #s-input { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; }

        /* Content Sections */
        .row { padding: 30px 5% 0; text-align: left; }
        .row h2 { font-size: 1.4rem; border-left: 5px solid var(--red); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        
        /* Netflix Premium Cards */
        .card { background: var(--gray); border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: 0.4s; cursor: pointer; position: relative; height: 260px; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: var(--red); box-shadow: 0 10px 40px #000; }
        .card img { width: 100%; height: 210px; object-fit: cover; background: #111; }
        .card-name { padding: 10px; font-size: 0.8rem; text-align: center; font-weight: bold; height: 50px; display: flex; align-items: center; justify-content: center; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.65rem; padding: 3px 8px; font-weight: bold; border-radius: 4px; }

        /* The Ultimate Theater */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); z-index: 10001; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; padding-top: 60px; box-sizing: border-box; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">SPk ULTIMATE</a></nav>

<div class="hero">
    <div class="search-box">
        <input type="text" id="s-input" placeholder="Search Netflix, HBO, 18+ & Global Hits...">
        <button class="s-btn" onclick="executeSearch()">SEARCH</button>
    </div>
</div>

<div class="main-body">
    <div class="row" id="search-row" style="display:none;">
        <h2 style="color: var(--red);">Found Results</h2>
        <div class="grid" id="search-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: #ff4d4d;">🔞 HOT & ADULT (18+)</h2>
        <div class="grid" id="adult-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: gold;">🌍 WORLDWIDE BLOCKBUSTERS</h2>
        <div class="grid" id="movie-grid"></div>
    </div>
</div>

<div id="theater">
    <div class="t-header">
        <span id="playing-title" style="font-weight: 900; color: var(--red);">STREAMING 4K UHD</span>
        <button class="close-btn" onclick="closeCinema()">✕ EXIT</button>
    </div>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const P = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244";

    // --- MANUALLY EMBEDDED GLOBAL DATABASE (LIFE-TIME WORKER) ---
    const catalog = [
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie', cat: 'adult' },
        { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt11389802', t: 'Stree 2', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt15239678', t: 'Dune: Messiah', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie', cat: 'movie' }
    ];

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "";
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openT(m.id, m.type, m.t);
            card.innerHTML = `<div class="badge">4K</div><img src="${P + m.i}" onerror="this.src='https://via.placeholder.com/300x450/E50914/FFFFFF?text=${m.t}'"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function executeSearch() {
        const q = document.getElementById('s-input').value.toLowerCase();
        if(!q) return;
        const res = catalog.filter(m => m.t.toLowerCase().includes(q));
        document.getElementById('search-row').style.display = "block";
        render(res, 'search-grid');
    }

    function openT(id, type, name) {
        window.open(ADS, '_blank'); 
        const theater = document.getElementById('theater');
        const frame = document.getElementById('video-frame');
        document.getElementById('playing-title').innerText = "STREAMING: " + name;
        
        // India-Friendly Direct Player (New Stable Server)
        frame.src = type === 'tv' ? `https://vidsrc.xyz/embed/tv?imdb=${id}` : `https://vidsrc.xyz/embed/movie?imdb=${id}`;
        theater.style.display = "block";
    }

    function closeCinema() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-frame').src = "";
    }

    window.onload = () => {
        render(catalog.filter(m => m.cat === 'adult'), 'adult-grid');
        render(catalog.filter(m => m.cat === 'movie'), 'movie-grid');
    };
</script>

</body>
</html>
