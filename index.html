<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Global 4K Streaming</title>
    <style>
        :root { --red: #E50914; --black: #050505; --dark-gray: #141414; --hover-scale: 1.15; }
        
        body { 
            background-color: var(--black); 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Netflix Glass-morphism Navigation */
        nav {
            position: fixed;
            top: 0; width: 100%;
            height: 70px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            align-items: center;
            padding: 0 5%;
            z-index: 2000;
            transition: background 0.5s;
            box-sizing: border-box;
        }

        .logo { color: var(--red); font-size: 2.2rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; }

        /* Search Engine Advanced */
        .hero-search {
            height: 60vh;
            background: linear-gradient(to bottom, rgba(5,5,5,0) 0%, var(--black) 100%), 
                        url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-07e3f8eb14b4/web/IN-en-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .search-bar {
            display: flex;
            width: 90%;
            max-width: 700px;
            background: rgba(0,0,0,0.75);
            border: 1px solid #444;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .search-bar input {
            flex: 1;
            padding: 18px;
            border: none;
            background: transparent;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .search-bar button {
            background: var(--red);
            color: white;
            border: none;
            padding: 0 35px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* Netflix Horizontal Rows */
        .row { margin: -50px 0 30px 5%; position: relative; z-index: 10; }
        .row-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .movie-rail {
            display: flex;
            overflow-x: scroll;
            overflow-y: hidden;
            gap: 12px;
            padding: 20px 0;
            scrollbar-width: none; /* Firefox */
        }

        .movie-rail::-webkit-scrollbar { display: none; }

        /* Advanced Movie Card */
        .card {
            flex: 0 0 200px;
            height: 280px;
            background: var(--dark-gray);
            border-radius: 6px;
            position: relative;
            cursor: pointer;
            transition: transform 0.45s ease, box-shadow 0.45s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(var(--hover-scale));
            z-index: 100;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px 10px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover .card-info { opacity: 1; }

        .tag-red {
            position: absolute;
            top: 10px; left: 0;
            background: var(--red);
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 900;
            border-radius: 0 4px 4px 0;
        }

        /* Cinema Theater (Pro Player) */
        #theater {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
        }

        .theater-nav {
            position: absolute;
            top: 0; width: 100%;
            padding: 25px;
            background: linear-gradient(rgba(0,0,0,0.9), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 10001;
        }

        .close-theater {
            background: var(--red);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .server-pills { display: flex; gap: 10px; }
        .pill { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.3); 
            color: white; padding: 8px 18px; 
            border-radius: 20px; cursor: pointer; 
            font-size: 0.8rem;
        }
        .pill.active { background: var(--red); border-color: var(--red); }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">SPk ULTIMATE</a></nav>

<div class="hero-search">
    <h1 style="font-size: 3rem; margin-bottom: 10px;">Unlimited 18+, Movies & Series</h1>
    <h2 style="font-weight: 400; margin-bottom: 30px;">Watch anywhere. Cancel never.</h2>
    <div class="search-bar">
        <input type="text" id="master-query" placeholder="What are you looking for?">
        <button onclick="globalSearch()">Get Started</button>
    </div>
</div>

<div class="row" id="search-row" style="display:none;">
    <div class="row-title">Search Results</div>
    <div class="movie-rail" id="search-rail"></div>
</div>

<div class="row">
    <div class="row-title">🔞 Hot & Adult Special (18+)</div>
    <div class="movie-rail" id="adult-rail"></div>
</div>

<div class="row">
    <div class="row-title">🌍 Global Trending Now</div>
    <div class="movie-rail" id="trending-rail"></div>
</div>

<div id="theater">
    <div class="theater-nav">
        <div>
            <div id="playing-now" style="font-size: 1.2rem; font-weight: bold; color: var(--red);">STREAMING 4K</div>
            <div class="server-pills">
                <button class="pill active" id="p1" onclick="switchSystem(1)">SERVER 1</button>
                <button class="pill" id="p2" onclick="switchSystem(2)">SERVER 2</button>
            </div>
        </div>
        <button class="close-theater" onclick="closeTheater()">✕ Close Player</button>
    </div>
    <iframe id="video-engine" src="" allowfullscreen></iframe>
</div>

<script>
    // TECHNOLOGY: Global Image Tunneling to bypass Jio/Airtel Block
    const PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const AD_LINK = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 
    const API_KEY = "844dba0bfd443a56f92d74a0d0d88b03";

    let activeID = ""; let activeTYPE = "";

    async function fetchCinema(url, railId) {
        const rail = document.getElementById(railId);
        try {
            const response = await fetch(url);
            const data = await response.json();
            data.results.forEach(m => {
                if(m.poster_path) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => launchCinema(m.id, m.media_type || (railId === 'tv-rail' ? 'tv' : 'movie'), m.title || m.name);
                    card.innerHTML = `
                        <div class="tag-red">TOP 10</div>
                        <img src="${PROXY + m.poster_path}" loading="lazy">
                        <div class="card-info"><b>${m.title || m.name}</b></div>
                    `;
                    rail.appendChild(card);
                }
            });
        } catch(e) { console.error("Global Engine Stalled"); }
    }

    function globalSearch() {
        const q = document.getElementById('master-query').value;
        if(q.length < 2) return;
        const rail = document.getElementById('search-rail');
        rail.innerHTML = "";
        document.getElementById('search-row').style.display = "block";
        fetchCinema(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`, 'search-rail');
        window.scrollTo({top: 450, behavior: 'smooth'});
    }

    function launchCinema(id, type, name) {
        window.open(AD_LINK, '_blank'); // Instant monetization
        activeID = id; activeTYPE = type;
        document.getElementById('playing-now').innerText = name;
        document.getElementById('theater').style.display = "block";
        switchSystem(1);
    }

    function switchSystem(s) {
        const engine = document.getElementById('video-engine');
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        document.getElementById('p' + s).classList.add('active');

        // TECHNOLOGY: Hybrid Failover Routing
        // Using high-speed worldwide bypass servers
        let base = (s === 1) ? `https://vidsrc.xyz/embed/` : `https://vidsrc.me/embed/`;
        engine.src = base + (activeTYPE === 'tv' ? `tv?imdb=${activeID}` : `movie?imdb=${activeID}`);
    }

    function closeTheater() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-engine').src = "";
    }

    window.onload = () => {
        // Advanced Discovery Algorithm (Genres: 10749 for Hot, 18+ style discovery)
        fetchCinema(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749&sort_by=popularity.desc`, 'adult-rail');
        fetchCinema(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`, 'trending-rail');
    };
</script>

</body>
</html>
