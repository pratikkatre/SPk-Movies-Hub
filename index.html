<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Guaranteed 4K Streaming</title>
    <style>
        :root { --red: #E50914; --black: #050505; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; text-align: center; }
        nav { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .row { padding: 30px 5% 0; text-align: left; }
        .row h2 { font-size: 1.3rem; border-left: 5px solid var(--red); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 20px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.4s; cursor: pointer; position: relative; height: 260px; }
        .card:hover { transform: scale(1.05); border-color: var(--red); box-shadow: 0 0 20px var(--red); }
        .card img { width: 100%; height: 215px; object-fit: cover; background: #222; }
        .card-name { padding: 8px; font-size: 0.8rem; text-align: center; font-weight: bold; background: #000; height: 45px; display: flex; align-items: center; justify-content: center; }
        .tag { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.6rem; padding: 3px 7px; font-weight: bold; border-radius: 4px; box-shadow: 0 0 10px #000; }
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(rgba(0,0,0,0.9), transparent); z-index: 10001; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav><div class="logo">SPk ULTIMATE</div> <span style="color: gold; font-size: 0.7rem; font-weight: bold;">PREMIUM 4K</span></nav>

<div class="row">

    <div class="grid" id="adult-grid"></div>
</div>

<div class="row">

</div>

<div class="row">
    <h2 style="color: #00d4ff;">📺 PREMIUM WEB SERIES</h2>
    <div class="grid" id="series-grid"></div>
</div>

<div id="theater">
    <div class="t-header">
        <span id="playing-title" style="font-weight: 900; color: var(--red);">STREAMING ULTRA HD</span>
        <button class="close-btn" onclick="closeCinema()">✕ EXIT</button>
    </div>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<script>

    // --- MANUALLY INJECTED GLOBAL DATABASE (NO SEARCH NEEDED) ---
    const database = {
        adult: [
            { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie' },
            { id: 'tt8772262', t: 'Euphoria (Hot)', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv' },
            { id: 'tt13008596', t: 'Elite (18+)', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv' },
            { id: 'tt11126994', t: 'Sex/Life', i: '/8mS2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv' },
            { id: 'tt13751694', t: 'Animal (Uncut)', i: '/vG9QOsl2G1l7t0OQp8t50S8tWUX.jpg', type: 'movie' }
        ],

            { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie' },
            { id: 'tt11389802', t: 'Stree 2 (2026)', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie' },

            { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie' }

    function renderGrid(list, gridId) {
        const grid = document.getElementById(gridId);
        list.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => playMovie(m.id, m.type, m.t);
            card.innerHTML = `<div class="tag">4K</div><img src="${P + m.i}" onerror="this.src='https://via.placeholder.com/200x300?text=${m.t}'"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function playMovie(id, type, name) {
        window.open(ADS, '_blank'); // Dollar earning link
        const theater = document.getElementById('theater');
        const frame = document.getElementById('video-frame');
        document.getElementById('playing-title').innerText = "NOW PLAYING: " + name;
        
        // Anti-Block Direct Player (Guaranteed to work in India)
        frame.src = type === 'tv' ? `https://vidsrc.me/embed/tv?imdb=${id}` : `https://vidsrc.me/embed/movie?imdb=${id}`;
        theater.style.display = "block";
    }

    function closeCinema() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-frame').src = "";
    }

    window.onload = () => {
        renderGrid(database.adult, 'adult-grid');
        renderGrid(database.movies, 'movie-grid');
        renderGrid(database.series, 'series-grid');
    };
</script>

</body>
</html>
