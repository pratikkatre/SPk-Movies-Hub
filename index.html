<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Global 4K Cinema</title>
    <style>
        :root { --red: #E50914; --black: #050505; --gray: #111; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Netflix Style Header */
        header { background: rgba(0,0,0,0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 2000; border-bottom: 2px solid var(--red); box-sizing: border-box; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; }
        .nav-links { font-size: 0.8rem; font-weight: bold; color: #ccc; }

        /* Hero Banner */
        .hero { padding: 120px 5% 40px; text-align: center; background: linear-gradient(to bottom, #222, #000); }
        .hero h1 { font-size: 2.5rem; margin: 0; color: #fff; text-shadow: 2px 2px 10px #000; }
        .hero p { color: var(--red); font-weight: bold; font-size: 1.1rem; }

        /* Rows */
        .row { padding: 30px 5% 0; text-align: left; }
        .row h2 { font-size: 1.4rem; border-left: 5px solid var(--red); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        
        /* Premium Cards */
        .card { background: var(--gray); border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.4s; cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: var(--red); box-shadow: 0 10px 40px #000; }
        .card img { width: 100%; height: 230px; object-fit: cover; background: #222; }
        .card-name { padding: 10px; font-size: 0.8rem; text-align: center; font-weight: bold; min-height: 35px; display: flex; align-items: center; justify-content: center; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.6rem; padding: 3px 8px; font-weight: bold; border-radius: 4px; box-shadow: 0 0 10px #000; }

        /* Global Player System */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; background: linear-gradient(rgba(0,0,0,0.9), transparent); z-index: 10001; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .server-switcher { display: flex; gap: 10px; margin-top: 10px; }
        .s-btn { background: #333; color: white; border: 1px solid #555; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .s-btn:hover { background: var(--red); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">SPk ULTIMATE</div>
    <div class="nav-links">GLOBAL PREMIUM 4K</div>
</header>

<div class="hero">
    <h1>WORLDWIDE CINEMA HUB</h1>
    <p>Movies • Series • 18+ Content</p>
</div>

<div class="row">
    <h2 style="color: gold;">🔥 TRENDING GLOBAL HITS</h2>
    <div class="grid" id="grid-trending"></div>
</div>

<div class="row">
    <h2 style="color: #ff4d4d;">🔞 HOT & ADULT (18+)</h2>
    <div class="grid" id="grid-hot"></div>
</div>

<div class="row">
    <h2>📺 POPULAR WEB SERIES</h2>
    <div class="grid" id="grid-series"></div>
</div>

<div id="theater">
    <div class="t-header">
        <div>
            <span id="playing-title" style="font-weight: 900; color: var(--red); text-transform: uppercase;">STREAMING</span>
            <div class="server-switcher">
                <button class="s-btn" onclick="changeS(1)">SERVER 1</button>
                <button class="s-btn" onclick="changeS(2)">SERVER 2</button>
                <button class="s-btn" onclick="changeS(3)">SERVER 3</button>
            </div>
        </div>
        <button class="close-btn" onclick="closeT()">✕ EXIT THEATER</button>
    </div>
    <iframe id="video-iframe" src="" allowfullscreen></iframe>
</div>

<script>
    const PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    let curId = ""; let curType = "";

    // WORLDWIDE DATABASE (MANUAL INJECTION FOR 100% RELIABILITY)
    const database = {
        trending: [
            { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie' },
            { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie' },
            { id: 'tt15239678', t: 'Dune: Messiah', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie' },
            { id: 'tt11389802', t: 'Stree 2', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie' },
            { id: 'tt14060094', t: 'Fighter', i: '/8XunofS9FvB7K0I6G2J8u70F7E.jpg', type: 'movie' }
        ],
        hot: [
            { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie' },
            { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv' },
            { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv' },
            { id: 'tt11126994', t: 'Sex/Life', i: '/8mS2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv' },
            { id: 'tt13751694', t: 'Animal (Uncut)', i: '/vG9QOsl2G1l7t0OQp8t50S8tWUX.jpg', type: 'movie' },
            { id: 'tt14671660', t: 'Obsession', i: '/vG9QOsl2G1l7t0OQp8t50S8tWUX.jpg', type: 'movie' }
        ],
        series: [
            { id: 'tt6468322', t: 'Money Heist', i: '/reEMJA1uzpG3SZ0KGbnQn76vQ4l.jpg', type: 'tv' },
            { id: 'tt14715170', t: 'Squid Game 2', i: '/dDlE6_BslXWbi0er9vDnkp9iGv5.jpg', type: 'tv' },
            { id: 'tt0944947', t: 'Game of Thrones', i: '/7WsyChvRStvT0tOFRunAURE3nE6.jpg', type: 'tv' },
            { id: 'tt1877514', t: 'The Boys', i: '/stKG9ebYreEBubkBhD7Gr3mcMp6.jpg', type: 'tv' }
        ]
    };

    function renderGrid(data, gridId) {
        const grid = document.getElementById(gridId);
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openT(m.id, m.type, m.t);
            card.innerHTML = `<div class="badge">4K</div><img src="${PROXY + m.i}" onerror="this.src='https://via.placeholder.com/200x300?text=${m.t}'"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function openT(id, type, name) {
        curId = id; curType = type;
        window.open(ADS, '_blank'); // Lifetime Profit Link
        document.getElementById('playing-title').innerText = "PLAYING: " + name;
        document.getElementById('theater').style.display = "block";
        changeS(1); // Default to Server 1
    }

    function changeS(s) {
        const f = document.getElementById('video-iframe');
        // Advanced Hybrid Switching for Indian ISP bypass
        let url = "";
        if(s === 1) url = (curType === 'tv') ? `https://vidsrc.me/embed/tv?imdb=${curId}` : `https://vidsrc.me/embed/movie?imdb=${curId}`;
        if(s === 2) url = (curType === 'tv') ? `https://vidsrc.pm/embed/tv/${curId}` : `https://vidsrc.pm/embed/movie/${curId}`;
        if(s === 3) url = (curType === 'tv') ? `https://autoembed.to/tv/imdb/${curId}` : `https://autoembed.to/movie/imdb/${curId}`;
        f.src = url;
    }

    function closeT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-iframe').src = "";
    }

    window.onload = () => {
        renderGrid(database.trending, 'grid-trending');
        renderGrid(database.hot, 'grid-hot');
        renderGrid(database.series, 'grid-series');
    };
</script>

</body>
</html>
