<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - The Elite Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #E50914; --bg: #050505; --card-bg: #121212; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Glassmorphism Header */
        header { background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; position: fixed; width: 100%; z-index: 5000; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        
        .search-engine { display: flex; width: 50%; background: rgba(255,255,255,0.1); border-radius: 50px; padding: 5px 15px; border: 1px solid transparent; transition: 0.4s; }
        .search-engine:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); background: rgba(255,255,255,0.15); }
        #search-query { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 1rem; }
        .search-trigger { background: var(--accent); color: white; border: none; padding: 8px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        /* Cinematic Experience Layout */
        .hero-banner { height: 70vh; background: linear-gradient(to top, var(--bg) 5%, transparent 90%), url('https://image.tmdb.org/t/p/original/69Uqt7vS68p1EBYI7913o9W4mJ7.jpg'); background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 50px 5%; }
        .hero-info h1 { font-size: 3.5rem; margin: 0; text-shadow: 0 10px 30px #000; }

        /* Multi-Server Movie Grid */
        .content-section { padding: 40px 5% 0; }
        .content-section h2 { font-size: 1.5rem; border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 25px; letter-spacing: 1px; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        
        .movie-tile { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; border: 1px solid #1a1a1a; position: relative; }
        .movie-tile:hover { transform: scale(1.1) translateY(-10px); z-index: 100; border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .movie-tile img { width: 100%; height: 260px; object-fit: cover; transition: 0.5s; }
        .movie-tile:hover img { filter: brightness(0.5); }
        
        .overlay-info { position: absolute; bottom: 0; width: 100%; padding: 20px; box-sizing: border-box; background: linear-gradient(transparent, rgba(0,0,0,1)); opacity: 0; transition: 0.3s; }
        .movie-tile:hover .overlay-info { opacity: 1; }
        .play-icon { background: var(--accent); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 1.2rem; }

        /* The Hybrid Theater Player */
        #theater-system { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .theater-nav { position: absolute; top: 20px; width: 100%; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .close-cinema { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1rem; box-shadow: 0 0 20px var(--accent); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">SPk CINEMA</div>
    <div class="search-engine">
        <input type="text" id="search-query" placeholder="Type name (e.g. Animal, Extraction)...">
        <button class="search-trigger" onclick="deepSearch()">SEARCH</button>
    </div>
</header>

<div class="hero-banner">
    <div class="hero-info">
        <h1>BEYOND LIMITS</h1>
        <p style="color:#aaa; font-size: 1.1rem; max-width: 500px;">Direct access to millions of 4K titles. Powered by Hybrid Streaming Technology.</p>
    </div>
</div>

<div class="content-section" id="results-area" style="display:none;">
    <h2 style="color:var(--accent)">Instant Matches</h2>
    <div class="grid-layout" id="search-results"></div>
</div>

<div class="content-section">
    <h2>Trending Masterpieces</h2>
    <div class="grid-layout" id="global-trending">
        </div>
</div>

<div id="theater-system">
    <div class="theater-nav">
        <span id="movie-status" style="font-weight: 900; color: var(--accent); letter-spacing: 2px;">4K ULTRA HD STREAM</span>
        <button class="close-cinema" onclick="shutTheater()">✕ EXIT CINEMA</button>
    </div>
    <iframe id="cinema-iframe" src="" allowfullscreen></iframe>
</div>

<script>
    // --- ADVANCED ELITE CONFIGURATION ---
    const KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const MONEY_LINK = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    const POSTER_HOST = "https://image.tmdb.org/t/p/w400";

    // Instant Deep Search Engine
    async function deepSearch() {
        const query = document.getElementById('search-query').value;
        if(!query) return;
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&query=${query}`);
        const data = await res.json();
        const grid = document.getElementById('search-results');
        document.getElementById('results-area').style.display = "block";
        grid.innerHTML = "";
        injectCards(data.results, 'search-results');
        window.scrollTo({ top: 600, behavior: 'smooth' });
    }

    // Elite Injection Logic
    function injectCards(items, targetId) {
        const target = document.getElementById(targetId);
        items.forEach(m => {
            if(m.poster_path) {
                const card = document.createElement('div');
                card.className = 'movie-tile';
                card.onclick = () => launchElitePlayer(m.id, m.media_type || 'movie', m.title || m.name);
                card.innerHTML = `
                    <img src="${POSTER_HOST + m.poster_path}" loading="lazy">
                    <div class="overlay-info">
                        <div class="play-icon">▶</div>
                        <div style="font-weight:700">${m.title || m.name}</div>
                        <div style="font-size:0.8rem;color:#888">Premium 4K HDR</div>
                    </div>
                `;
                target.appendChild(card);
            }
        });
    }

    // Hybrid Multi-Server Launch
    function launchElitePlayer(id, type, name) {
        // --- AD MAXIMIZER ---
        alert("Establishing Secure Direct Connection for: " + name);
        window.open(MONEY_LINK, '_blank');

        // --- SEAMLESS PLAYER INJECTION ---
        setTimeout(() => {
            const theater = document.getElementById('theater-system');
            const iframe = document.getElementById('cinema-iframe');
            // Advanced Direct Embedding Link
            const serverUrl = type === 'tv' ? `https://vidsrc.to/embed/tv/${id}` : `https://vidsrc.to/embed/movie/${id}`;
            iframe.src = serverUrl;
            theater.style.display = "block";
        }, 1200);
    }

    function shutTheater() {
        document.getElementById('theater-system').style.display = "none";
        document.getElementById('cinema-iframe').src = "";
    }

    // Auto-Populate Initial Global State
    window.onload = () => {
        fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${KEY}`)
        .then(r => r.json())
        .then(d => injectCards(d.results, 'global-trending'));
    };
</script>

</body>
</html>
