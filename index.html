<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Global Premium</title>
    <style>
        :root { --red: #E50914; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Helvetica Neue', Arial; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Premium Nav */
        nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: fixed; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; text-decoration: none; letter-spacing: 2px; }

        /* Netflix Hero */
        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.2), var(--black)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-07e3f8eb14b4/web/IN-en-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg'); background-size: cover; padding: 0 10%; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .search-container { display: flex; width: 100%; max-width: 600px; background: white; border-radius: 4px; overflow: hidden; margin-top: 20px; }
        #s-input { flex: 1; padding: 15px; border: none; outline: none; font-size: 1rem; color: black; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; }

        /* Content Rows */
        .row { padding: 20px 0 0 5%; margin-top: -50px; position: relative; z-index: 10; }
        .row h2 { font-size: 1.4rem; margin-bottom: 15px; }
        .rail { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; scrollbar-width: none; }
        .rail::-webkit-scrollbar { display: none; }
        
        /* Movie Cards */
        .card { flex: 0 0 160px; height: 240px; background: #141414; border-radius: 4px; overflow: hidden; transition: 0.4s; cursor: pointer; position: relative; border: 1px solid #333; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: white; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 0; background: var(--red); font-size: 0.6rem; padding: 2px 8px; font-weight: bold; }

        /* Pro Player Theater */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); z-index: 10001; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .server-box { display: flex; gap: 10px; margin-top: 5px; }
        .s-btn-mini { background: #333; color: white; border: 1px solid #555; padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
        .s-btn-mini:hover { background: var(--red); }
        iframe { width: 100%; height: 100%; border: none; padding-top: 60px; box-sizing: border-box; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">SPk ULTIMATE</a></nav>

<div class="hero">
    <h1>Unlimited 18+, Movies & Series</h1>
    <div class="search-container">
        <input type="text" id="s-input" placeholder="Search Netflix, 18+ & Global Hits...">
        <button class="s-btn" onclick="startSearch()">SEARCH</button>
    </div>
</div>

<div class="row" id="search-row" style="display:none;">
    <h2 style="color: var(--red);">Search Results</h2>
    <div class="rail" id="search-rail"></div>
</div>

<div class="row">
    <h2 style="color: #ff4d4d;">🔞 Hot & Adult Special (18+)</h2>
    <div class="rail" id="adult-rail"></div>
</div>

<div class="row">
    <h2 style="color: gold;">🌍 Trending Blockbusters</h2>
    <div class="rail" id="movie-rail"></div>
</div>

<div id="theater">
    <div class="t-header">
        <div>
            <span id="playing-title" style="font-weight: 900; color: var(--red);">STREAMING 4K UHD</span>
            <div class="server-box">
                <button class="s-btn-mini" onclick="changeS(1)">Server 1</button>
                <button class="s-btn-mini" onclick="changeS(2)">Server 2</button>
            </div>
        </div>
        <button class="close-btn" onclick="closeT()">✕ EXIT</button>
    </div>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const P = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 
    let curID = ""; let curTYP = "";

    // --- HARD-CODED GLOBAL DATABASE (NO API NEEDED) ---
    const database = [
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie', cat: 'adult' },
        { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt11389802', t: 'Stree 2', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie', cat: 'movie' }
    ];

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "";
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openT(m.id, m.type, m.t);
            card.innerHTML = `<div class="badge">TOP 10</div><img src="${P + m.i}" onerror="this.src='https://via.placeholder.com/200x300/E50914/FFFFFF?text=${m.t}'"><div style="position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.7);padding:5px;font-size:0.7rem;text-align:center;">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function startSearch() {
        const q = document.getElementById('s-input').value.toLowerCase();
        if(!q) return;
        const res = database.filter(m => m.t.toLowerCase().includes(q));
        document.getElementById('search-row').style.display = "block";
        render(res, 'search-rail');
        window.scrollTo({top: 400, behavior: 'smooth'});
    }

    function openT(id, type, name) {
        window.open(ADS, '_blank'); 
        curID = id; curTYP = type;
        document.getElementById('playing-title').innerText = name;
        document.getElementById('theater').style.display = "block";
        changeS(1);
    }

    function changeS(s) {
        const f = document.getElementById('v-frame');
        // India-Stable Servers
        let base = (s === 1) ? `https://vidsrc.xyz/embed/` : `https://vidsrc.me/embed/`;
        f.src = base + (curTYP === 'tv' ? `tv?imdb=${curID}` : `movie?imdb=${curID}`);
    }

    function closeT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => {
        render(database.filter(m => m.cat === 'adult'), 'adult-rail');
        render(database.filter(m => m.cat === 'movie'), 'movie-rail');
    };
</script>

</body>
</html>
