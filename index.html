<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Premium Global Streaming</title>
    <style>
        :root { --red: #E50914; --black: #050505; --card-bg: #141414; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Premium Navigation */
        nav { background: rgba(0,0,0,0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 2000; border-bottom: 2px solid #222; box-sizing: border-box; }
        .logo { color: var(--red); font-size: 2rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; text-transform: uppercase; }

        /* Search Hero Section */
        .hero { padding: 120px 5% 40px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #050505); }
        .search-container { display: flex; max-width: 800px; margin: 20px auto; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        #query { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; font-size: 1.1rem; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 40px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Netflix Content Rows */
        .row { padding: 30px 0 0 5%; }
        .row h2 { font-size: 1.5rem; margin-bottom: 20px; border-left: 6px solid var(--red); padding-left: 15px; letter-spacing: 1px; }
        .posters-container { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 30px; scroll-behavior: smooth; }
        .posters-container::-webkit-scrollbar { display: none; }
        
        /* Netflix Style Movie Cards */
        .card { flex: 0 0 170px; height: 250px; background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.15); z-index: 100; border-color: var(--red); box-shadow: 0 10px 40px #000; }
        .card img { width: 100%; height: 100%; object-fit: cover; background: #111; }
        .card-title { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 15px 5px 5px; font-size: 0.75rem; text-align: center; font-weight: bold; }
        .tag-4k { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.65rem; padding: 3px 8px; font-weight: bold; border-radius: 3px; }

        /* Global Cinema Overlay */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(rgba(0,0,0,0.9), transparent); z-index: 10001; box-sizing: border-box; }
        .exit-btn { background: var(--red); color: white; border: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .server-switcher { display: flex; gap: 12px; margin-top: 10px; }
        .s-opt { background: #333; color: white; border: 1px solid #555; padding: 6px 18px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .s-opt:hover, .s-opt.active { background: var(--red); }
        iframe { width: 100%; height: 100%; border: none; padding-top: 50px; box-sizing: border-box; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">SPk ULTIMATE</a></nav>

<div class="hero">
    <h1>UNLIMITED MOVIES & SERIES</h1>
    <div class="search-container">
        <input type="text" id="query" placeholder="Search 8,00,000+ Movies, 18+ Content, Webseries...">
        <button class="s-btn" onclick="masterSearch()">SEARCH</button>
    </div>
</div>

<div class="row" id="search-row" style="display:none;">
    <h2 style="color: var(--red);">Found Results</h2>
    <div class="posters-container" id="search-grid"></div>
</div>

<div class="row">
    <h2 style="color: #ff4d4d;">🔞 Hot & Adult Worldwide (18+)</h2>
    <div class="posters-container" id="hot-grid"></div>
</div>

<div class="row">
    <h2 style="color: gold;">🌍 Trending Blockbusters</h2>
    <div class="posters-container" id="trending-grid"></div>
</div>

<div class="row">
    <h2>📺 Top Web Series</h2>
    <div class="posters-container" id="tv-grid"></div>
</div>

<div id="theater">
    <div class="t-header">
        <div>
            <span id="playing-title" style="font-weight: 900; color: var(--red); text-transform: uppercase;">STREAMING UHD</span>
            <div class="server-switcher">
                <button class="s-opt active" id="b1" onclick="changeS(1)">SERVER 1</button>
                <button class="s-opt" id="b2" onclick="changeS(2)">SERVER 2</button>
            </div>
        </div>
        <button class="exit-btn" onclick="closeCinema()">✕ EXIT</button>
    </div>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 
    let activeID = ""; let activeTYPE = "";

    async function loadOcean(url, gridId) {
        const grid = document.getElementById(gridId);
        try {
            const res = await fetch(url);
            const data = await res.json();
            data.results.forEach(m => {
                if(m.poster_path) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openCinema(m.id, m.media_type || (gridId==='tv-grid'?'tv':'movie'), m.title || m.name);
                    card.innerHTML = `<div class="tag-4k">4K</div><img src="${PROXY + m.poster_path}" loading="lazy"><div class="card-title">${m.title || m.name}</div>`;
                    grid.appendChild(card);
                }
            });
        } catch(e) { console.log("Network Busy"); }
    }

    function masterSearch() {
        const q = document.getElementById('query').value;
        if(q.length < 2) return;
        document.getElementById('search-grid').innerHTML = "";
        document.getElementById('search-row').style.display = "block";
        loadOcean(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`, 'search-grid');
        window.scrollTo({top: 300, behavior: 'smooth'});
    }

    function openCinema(id, type, name) {
        window.open(ADS, '_blank'); // Dollar revenue
        activeID = id; activeTYPE = type;
        document.getElementById('playing-title').innerText = "STREAMING: " + name;
        document.getElementById('theater').style.display = "block";
        changeS(1);
    }

    function changeS(s) {
        const f = document.getElementById('video-frame');
        document.querySelectorAll('.s-opt').forEach(b => b.classList.remove('active'));
        document.getElementById('b' + s).classList.add('active');
        
        // Anti-ISP Block Servers
        let url = (s === 1) ? `https://vidsrc.xyz/embed/` : `https://autoembed.to/`;
        let path = (activeTYPE === 'tv') ? (s === 2 ? `tv/imdb/${activeID}` : `tv?imdb=${activeID}`) : (s === 2 ? `movie/imdb/${activeID}` : `movie?imdb=${activeID}`);
        f.src = url + path;
    }

    function closeCinema() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-frame').src = "";
    }

    window.onload = () => {
        loadOcean(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749&sort_by=popularity.desc`, 'hot-grid');
        loadOcean(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`, 'trending-grid');
        loadOcean(`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}`, 'tv-grid');
    };
</script>

</body>
</html>
