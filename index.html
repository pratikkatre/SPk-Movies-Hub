<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - 4K High Speed Cinema</title>
    <style>
        :root { --red: #E50914; --black: #050505; }
        body { font-family: 'Helvetica', Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; text-align: center; }
        
        nav { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }

        .row { padding: 30px 5%; text-align: left; }
        .row h2 { font-size: 1.2rem; border-left: 5px solid var(--red); padding-left: 12px; margin-bottom: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .card { background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.05); border-color: var(--red); box-shadow: 0 0 15px var(--red); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-name { padding: 8px; font-size: 0.75rem; text-align: center; font-weight: bold; }
        .tag { position: absolute; top: 5px; right: 5px; background: var(--red); font-size: 0.6rem; padding: 2px 5px; font-weight: bold; border-radius: 3px; }

        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav><div class="logo">SPk ULTIMATE</div></nav>

<div class="row">
    <h2 style="color: gold;">⭐ 2026 TOP BLOCKBUSTERS</h2>
    <div class="grid" id="grid-trending"></div>
</div>

<div class="row">
    <h2 style="color: #ff4d4d;">🔞 HOT & ADULT TRENDING</h2>
    <div class="grid" id="grid-hot"></div>
</div>

<div id="theater">
    <button class="close-btn" onclick="exitTheater()">✕ CLOSE</button>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    // Using an Image Proxy to bypass Jio Block
    const P = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";

    const trending = [
        { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie' },
        { id: 'tt15239678', t: 'Dune: Messiah', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie' },
        { id: 'tt11389802', t: 'Stree 3', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie' },
        { id: 'tt2962390', t: 'Singham Returns', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie' },
        { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie' }
    ];

    const hot = [
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie' },
        { id: 'tt13008596', t: 'Elite (Hot Series)', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv' },
        { id: 'tt11126994', t: 'Sex/Life (18+)', i: '/8mS2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv' },
        { id: 'tt8772262', t: 'Euphoria (Hot)', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv' },
        { id: 'tt6468322', t: 'Money Heist', i: '/reEMJA1uzpG3SZ0KGbnQn76vQ4l.jpg', type: 'tv' },
        { id: 'tt13751694', t: 'Animal (Uncut)', i: '/vG9QOsl2G1l7t0OQp8t50S8tWUX.jpg', type: 'movie' }
    ];

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => playMovie(m.id, m.type, m.t);
            card.innerHTML = `<div class="tag">4K UHD</div><img src="${P + m.i}"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function playMovie(id, type, name) {
        window.open(ADS, '_blank'); 
        alert("Connecting to Premium Server for: " + name);
        const theater = document.getElementById('theater');
        const frame = document.getElementById('v-frame');
        frame.src = type === 'tv' ? `https://vidsrc.me/embed/tv?imdb=${id}` : `https://vidsrc.me/embed/movie?imdb=${id}`;
        theater.style.display = "block";
    }

    function exitTheater() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => { render(trending, 'grid-trending'); render(hot, 'grid-hot'); }
</script>

</body>
</html>
