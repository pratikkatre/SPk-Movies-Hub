<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Worldwide 4K Cinema</title>
    <style>
        :root { --red: #E50914; --black: #050505; --gray: #141414; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Netflix Style Fixed Header */
        header { background: rgba(0,0,0,0.98); padding: 12px 5%; display: flex; flex-direction: column; align-items: center; position: fixed; width: 100%; z-index: 2000; border-bottom: 2px solid var(--red); box-sizing: border-box; }
        .nav-top { display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 10px; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; }
        
        /* Ultimate Search Bar */
        .search-box { display: flex; width: 100%; max-width: 700px; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        #s-input { flex: 1; padding: 12px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; }

        /* Content Area */
        .main { padding-top: 150px; }
        .row { padding: 25px 5% 0; }
        .row h2 { font-size: 1.4rem; margin-bottom: 15px; border-left: 5px solid var(--red); padding-left: 15px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        
        /* Premium Cards */
        .card { background: var(--gray); border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: 0.4s; cursor: pointer; position: relative; height: 260px; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: var(--red); box-shadow: 0 10px 40px #000; }
        .card img { width: 100%; height: 210px; object-fit: cover; background: #1a1a1a; }
        .card-name { padding: 8px; font-size: 0.8rem; text-align: center; font-weight: bold; height: 50px; display: flex; align-items: center; justify-content: center; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.6rem; padding: 3px 7px; font-weight: bold; border-radius: 3px; }

        /* The Cinema Theater */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); z-index: 10001; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 8px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; padding-top: 60px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <a href="#" class="logo" onclick="location.reload()">SPk ULTIMATE</a>
        <span style="color: gold; font-size: 0.7rem; font-weight: bold;">PREMIUM 4K MODE</span>
    </div>
    <div class="search-box">
        <input type="text" id="s-input" placeholder="Search Netflix, 18+, Movies & Series...">
        <button class="s-btn" onclick="startSearch()">SEARCH</button>
    </div>
</header>

<div class="main">
    <div class="row" id="search-row" style="display:none;">
        <h2 style="color: var(--red);">Search Results</h2>
        <div class="grid" id="search-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: #ff4d4d;">🔞 HOT & ADULT SPECIAL (18+)</h2>
        <div class="grid" id="adult-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: gold;">🌍 GLOBAL BLOCKBUSTERS</h2>
        <div class="grid" id="movie-grid"></div>
    </div>
</div>

<div id="theater">
    <div class="t-header">
        <span id="playing-title" style="font-weight: bold; color: var(--red);">INITIALIZING STREAM...</span>
        <button class="close-btn" onclick="exitT()">✕ EXIT</button>
    </div>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const P = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 

    // --- LIFETIME EMBEDDED DATABASE ---
    const catalog = [
        // Adult
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie', cat: 'adult' },
        { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt11126994', t: 'Sex/Life', i: '/8mS2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt13751694', t: 'Animal (Uncut)', i: '/vG9QOsl2G1l7t0OQp8t50S8tWUX.jpg', type: 'movie', cat: 'adult' },
        // Movies
        { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt11389802', t: 'Stree 2', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt15239678', t: 'Dune: Messiah', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt6468322', t: 'Money Heist', i: '/reEMJA1uzpG3SZ0KGbnQn76vQ4l.jpg', type: 'tv', cat: 'movie' }
    ];

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "";
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => play(m.id, m.type, m.t);
            card.innerHTML = `<div class="badge">4K</div><img src="${P + m.i}"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function startSearch() {
        const q = document.getElementById('s-input').value.toLowerCase();
        if(!q) return;
        const results = catalog.filter(m => m.t.toLowerCase().includes(q));
        document.getElementById('search-row').style.display = "block";
        render(results, 'search-grid');
        window.scrollTo({top: 150, behavior: 'smooth'});
    }

    function play(id, type, name) {
        window.open(ADS, '_blank'); 
        const theater = document.getElementById('theater');
        const frame = document.getElementById('v-frame');
        document.getElementById('playing-title').innerText = "NOW STREAMING: " + name;
        frame.src = type === 'tv' ? `https://vidsrc.me/embed/tv?imdb=${id}` : `https://vidsrc.me/embed/movie?imdb=${id}`;
        theater.style.display = "block";
    }

    function exitT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => {
        render(catalog.filter(m => m.cat === 'adult'), 'adult-grid');
        render(catalog.filter(m => m.cat === 'movie'), 'movie-grid');
    };
</script>

</body>
</html>
