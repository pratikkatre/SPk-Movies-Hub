<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Global Cinema Empire</title>
    <style>
        :root { --red: #E50914; --black: #050505; --card: #181818; }
        body { background: var(--black); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Premium Navigation */
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; border-bottom: 2px solid var(--red); box-sizing: border-box; }
        .logo { color: var(--red); font-size: 2rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; }

        /* Search Hero */
        .hero { padding: 40px 5%; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #000); }
        .hero h1 { font-size: 2.2rem; margin-bottom: 20px; }
        .search-box { display: flex; max-width: 600px; margin: 0 auto; background: #222; border-radius: 4px; border: 1px solid #444; overflow: hidden; }
        #s-input { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; }

        /* Netflix Rows */
        .row { padding: 30px 5% 0; }
        .row h2 { font-size: 1.5rem; border-left: 6px solid var(--red); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        /* High-End Card Design */
        .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; height: 280px; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: white; box-shadow: 0 15px 40px #000; }
        .card img { width: 100%; height: 220px; object-fit: cover; background: #111; }
        .card-name { padding: 10px; font-size: 0.85rem; text-align: center; font-weight: bold; height: 60px; display: flex; align-items: center; justify-content: center; background: #000; }
        .badge { position: absolute; top: 12px; right: 12px; background: var(--red); font-size: 0.65rem; padding: 4px 10px; font-weight: bold; border-radius: 4px; }

        /* Integrated Cinema Player */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); z-index: 10001; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px var(--red); }
        iframe { width: 100%; height: 100%; border: none; padding-top: 60px; box-sizing: border-box; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">SPk ULTIMATE</a></nav>

<div class="hero">
    <h1>Billionaire Cinema Hub</h1>
    <div class="search-box">
        <input type="text" id="s-input" placeholder="Search Netflix, 18+ & Blockbusters...">
        <button class="s-btn" onclick="executeSearch()">SEARCH</button>
    </div>
</div>

<div class="container">
    <div class="row" id="s-row" style="display:none;"><h2 style="color: var(--red);">Search Results</h2><div class="grid" id="s-grid"></div></div>
    
    <div class="row">
        <h2 style="color: #ff4d4d;">🔞 Hot & Adult Special (18+)</h2>
        <div class="grid" id="adult-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: gold;">🌍 Trending Blockbusters</h2>
        <div class="grid" id="movie-grid"></div>
    </div>
</div>

<div id="theater">
    <div class="t-header">
        <span id="p-title" style="font-weight: 900; color: var(--red); text-transform: uppercase;">4K ULTRA HD STREAMING</span>
        <button class="close-btn" onclick="closeT()">✕ EXIT THEATER</button>
    </div>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const P = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 

    // भावा, ही जगातील सर्वात मोठी 'Legal Injection' सिस्टिम आहे. 
    // आपण डेटा बाहेरून मागवणार नाही, तो या कोडमध्ये आधीच सुरक्षित आहे.
    const database = [
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie', cat: 'adult' },
        { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt11126994', t: 'Sex/Life', i: '/8mS2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt11389802', t: 'Stree 2', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt15239678', t: 'Dune 2', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt6468322', t: 'Money Heist', i: '/reEMJA1uzpG3SZ0KGbnQn76vQ4l.jpg', type: 'tv', cat: 'movie' },
        { id: 'tt14715170', t: 'Squid Game 2', i: '/dDlE6_BslXWbi0er9vDnkp9iGv5.jpg', type: 'tv', cat: 'movie' }
    ];

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "";
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => launch(m.id, m.type, m.t);
            // Image Tunneling Technology
            card.innerHTML = `<div class="badge">4K UHD</div><img src="${P + m.i}" onerror="this.src='https://via.placeholder.com/300x450/111/fff?text=${m.t}'"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function executeSearch() {
        const q = document.getElementById('s-input').value.toLowerCase();
        if(!q) return;
        const res = database.filter(m => m.t.toLowerCase().includes(q));
        document.getElementById('s-row').style.display = "block";
        render(res, 's-grid');
    }

    function launch(id, type, name) {
        window.open(ADS, '_blank'); // Dollar revenue
        const theater = document.getElementById('theater');
        const frame = document.getElementById('v-frame');
        document.getElementById('p-title').innerText = "PLAYING: " + name;
        
        // LEGAL BYPASS PLAYER: VidSrc PRO
        frame.src = `https://vidsrc.pro/embed/${type}/${id}`;
        theater.style.display = "block";
    }

    function closeT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => {
        render(database.filter(m => m.cat === 'adult'), 'adult-grid');
        render(database.filter(m => m.cat === 'movie'), 'movie-grid');
    };
</script>

</body>
</html>
