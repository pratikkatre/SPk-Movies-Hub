<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Premium Global Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E50914; --black: #050505; --card-bg: #141414; }
        body { font-family: 'Outfit', sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Premium Navbar */
        nav { background: rgba(0,0,0,0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 2000; box-sizing: border-box; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; cursor: pointer; }
        .nav-links { display: flex; gap: 20px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .nav-links span { cursor: pointer; transition: 0.3s; }
        .nav-links span:hover { color: var(--red); }

        /* Search Banner */
        .hero { padding: 120px 5% 40px; text-align: center; background: linear-gradient(to bottom, #111, var(--black)); }
        .search-bar { display: flex; max-width: 600px; margin: 20px auto; background: #222; border-radius: 50px; overflow: hidden; border: 1px solid #444; }
        #query { flex: 1; padding: 15px 25px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
        .s-btn { background: var(--red); border: none; color: white; padding: 0 30px; font-weight: bold; cursor: pointer; }

        /* Rows Layout */
        .row { padding: 20px 0 0 5%; }
        .row h2 { font-size: 1.3rem; margin-bottom: 15px; border-left: 4px solid var(--red); padding-left: 12px; }
        .posters-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; scroll-behavior: smooth; }
        .posters-scroll::-webkit-scrollbar { display: none; }
        
        /* Netflix Style Cards */
        .movie-card { flex: 0 0 150px; height: 225px; background: var(--card-bg); border-radius: 8px; overflow: hidden; position: relative; transition: 0.4s; cursor: pointer; }
        .movie-card:hover { transform: scale(1.1); z-index: 100; box-shadow: 0 10px 30px #000; border: 2px solid var(--red); }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 8px; right: 8px; background: var(--red); font-size: 0.6rem; padding: 2px 5px; font-weight: bold; border-radius: 3px; }

        /* Cinema Theater Player */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .theater-header { position: absolute; top: 0; width: 100%; padding: 20px; background: linear-gradient(rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.reload()">SPk ULTIMATE</div>
    <div class="nav-links">
        <span onclick="fetchByGenre(28, 'Action')">Action</span>
        <span onclick="fetchByGenre(16, 'Animation/Kids')">Kids</span>
        <span onclick="fetchByGenre(18, 'Drama')">Drama</span>
        <span onclick="fetchByGenre(10749, 'Romance')">Adult/Romance</span>
    </div>
</nav>

<div class="hero">
    <h1>ALL WORLDWIDE CONTENT</h1>
    <div class="search-bar">
        <input type="text" id="query" placeholder="Search any movie or webseries (Netflix, HBO, Disney)...">
        <button class="s-btn" onclick="globalSearch()">SEARCH</button>
    </div>
</div>

<div class="row" id="search-row" style="display:none;">
    <h2 id="search-label">Results</h2>
    <div class="posters-scroll" id="search-grid"></div>
</div>

<div class="row">
    <h2 id="section-title">Trending Globally</h2>
    <div class="posters-scroll" id="trending-grid"></div>
</div>

<div class="row">
    <h2>Popular TV Series</h2>
    <div class="posters-scroll" id="series-grid"></div>
</div>

<div id="theater">
    <div class="theater-header">
        <span id="playing-now" style="font-weight: bold; color: var(--red);">4K ULTRA HD STREAMING</span>
        <button class="close-btn" onclick="closeTheater()">✕ CLOSE</button>
    </div>
    <iframe id="cinema-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; // Your Earning Link
    const IMG_HOST = "https://image.tmdb.org/t/p/w500";

    async function loadData(url, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "<p style='padding:20px;'>Syncing with Servers...</p>";
        try {
            const res = await fetch(url);
            const data = await res.json();
            grid.innerHTML = "";
            data.results.forEach(m => {
                if(m.poster_path) {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.onclick = () => openMovie(m.id, m.media_type || 'movie', m.title || m.name);
                    card.innerHTML = `<div class="badge">4K</div><img src="${IMG_HOST + m.poster_path}">`;
                    grid.appendChild(card);
                }
            });
        } catch(e) { grid.innerHTML = "<p>Connection Error. Use VPN.</p>"; }
    }

    async function globalSearch() {
        const q = document.getElementById('query').value;
        if(q.length < 2) return;
        document.getElementById('search-row').style.display = "block";
        loadData(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`, 'search-grid');
        window.scrollTo({ top: 350, behavior: 'smooth' });
    }

    async function fetchByGenre(id, label) {
        document.getElementById('section-title').innerText = label + " Highlights";
        loadData(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`, 'trending-grid');
    }

    function openMovie(id, type, name) {
        alert("Establishing Secure 4K Connection for: " + name);
        window.open(ADS, '_blank'); // Open ad in new tab
        
        // Return to site and load movie immediately
        const theater = document.getElementById('theater');
        const frame = document.getElementById('cinema-frame');
        document.getElementById('playing-now').innerText = "NOW PLAYING: " + name;
        frame.src = type === 'tv' ? `https://vidsrc.to/embed/tv/${id}` : `https://vidsrc.to/embed/movie/${id}`;
        theater.style.display = "block";
    }

    function closeTheater() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('cinema-frame').src = "";
    }

    window.onload = () => {
        loadData(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`, 'trending-grid');
        loadData(`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}`, 'series-grid');
    };
</script>

</body>
</html>
