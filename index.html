<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Global Premium Cinema</title>
    <style>
        :root { --red: #E50914; --black: #050505; --gray: #1a1a1a; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Fixed Premium Header */
        header { background: rgba(0,0,0,0.98); padding: 12px 5%; display: flex; flex-direction: column; align-items: center; position: fixed; width: 100%; z-index: 2000; border-bottom: 2px solid var(--red); box-sizing: border-box; }
        .nav-bar { display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 10px; }
        .logo { color: var(--red); font-size: 2rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; text-shadow: 0 0 10px var(--red); }

        /* Search Engine */
        .search-engine { display: flex; width: 100%; max-width: 800px; background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #444; }
        #q-input { flex: 1; padding: 14px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
        .q-btn { background: var(--red); color: white; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; }

        /* Content Rows */
        .container { padding-top: 160px; }
        .row { padding: 25px 5% 0; }
        .row h2 { font-size: 1.5rem; margin-bottom: 18px; border-left: 6px solid var(--red); padding-left: 15px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        /* Netflix Style Cards */
        .card { background: var(--gray); border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: 0.4s; cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: var(--red); box-shadow: 0 10px 50px #000; }
        .card img { width: 100%; height: 240px; object-fit: cover; background: #111; }
        .card-name { padding: 12px; font-size: 0.85rem; text-align: center; font-weight: bold; min-height: 40px; display: flex; align-items: center; justify-content: center; background: #000; }
        .quality { position: absolute; top: 12px; right: 12px; background: var(--red); font-size: 0.7rem; padding: 4px 8px; font-weight: bold; border-radius: 4px; box-shadow: 0 0 10px #000; }

        /* Global Theater Player */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-nav { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(rgba(0,0,0,0.95), transparent); z-index: 10001; box-sizing: border-box; }
        .exit-btn { background: var(--red); color: white; border: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .server-wrap { display: flex; gap: 10px; margin-top: 5px; }
        .s-link { background: #333; color: white; border: 1px solid #555; padding: 6px 15px; border-radius: 5px; font-size: 0.75rem; cursor: pointer; }
        .s-link.active { background: var(--red); }
        iframe { width: 100%; height: 100%; border: none; padding-top: 60px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="nav-bar">
        <a href="#" class="logo">SPk ULTIMATE</a>
        <span style="color: gold; font-weight: bold; font-size: 0.8rem;">GLOBAL 4K UHD</span>
    </div>
    <div class="search-engine">
        <input type="text" id="q-input" placeholder="Search Netflix, HBO, 18+ & Global Hits...">
        <button class="q-btn" onclick="startSearch()">EXPLORE</button>
    </div>
</header>

<div class="container">
    <div class="row" id="s-row" style="display:none;">
        <h2 style="color: var(--red);">Search Results</h2>
        <div class="grid" id="s-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: #ff4d4d;">🔞 HOT & ADULT WORLDWIDE (18+)</h2>
        <div class="grid" id="hot-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: gold;">🌍 WORLDWIDE BLOCKBUSTERS</h2>
        <div class="grid" id="movie-grid"></div>
    </div>
</div>

<div id="theater">
    <div class="t-nav">
        <div>
            <span id="playing-title" style="font-weight: 900; color: var(--red);">PLAYING ULTRA HD</span>
            <div class="server-wrap">
                <button class="s-link active" id="b1" onclick="changeServer(1)">SERVER 1</button>
                <button class="s-btn-mini s-link" id="b2" onclick="changeServer(2)">SERVER 2</button>
            </div>
        </div>
        <button class="exit-btn" onclick="closeT()">✕ EXIT</button>
    </div>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 
    let activeID = ""; let activeTYP = "";

    // GLOBAL HARD-CODED DATABASE (NO ERROR SYSTEM)
    const library = [
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie', cat: 'adult' },
        { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt11126994', t: 'Sex/Life', i: '/8mS2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt11389802', t: 'Stree 2 (2026)', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt15239678', t: 'Dune: Messiah', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie', cat: 'movie' }
    ];

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "";
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => play(m.id, m.type, m.t);
            // Image Bypass Logic
            card.innerHTML = `<div class="quality">4K</div><img src="${PROXY + m.i}" onerror="this.src='https://via.placeholder.com/300x450/E50914/FFFFFF?text=${m.t}'"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function startSearch() {
        const q = document.getElementById('q-input').value.toLowerCase();
        if(!q) return;
        const res = library.filter(m => m.t.toLowerCase().includes(q));
        document.getElementById('s-row').style.display = "block";
        render(res, 's-grid');
    }

    function play(id, type, name) {
        window.open(ADS, '_blank'); // Lifetime Ad Revenue
        activeID = id; activeTYP = type;
        document.getElementById('playing-title').innerText = "NOW STREAMING: " + name;
        document.getElementById('theater').style.display = "block";
        changeServer(1);
    }

    function changeServer(s) {
        const f = document.getElementById('v-frame');
        document.querySelectorAll('.s-link').forEach(b => b.classList.remove('active'));
        document.getElementById('b' + s).classList.add('active');
        
        let url = (s === 1) ? `https://vidsrc.xyz/embed/` : `https://vidsrc.me/embed/`;
        f.src = url + (activeTYP === 'tv' ? `tv?imdb=${activeID}` : `movie?imdb=${activeID}`);
    }

    function closeT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => {
        render(library.filter(m => m.cat === 'adult'), 'hot-grid');
        render(library.filter(m => m.cat === 'movie'), 'movie-grid');
    };
</script>

</body>
</html>
