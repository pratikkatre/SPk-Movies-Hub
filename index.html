<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk CINEMA - Next Gen Streaming</title>
    <style>
        :root { --primary: #ff0000; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Poppins', sans-serif; background: #050505; color: #fff; margin: 0; overflow-x: hidden; }
        
        /* Hyper-Modern Navbar */
        nav { background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; position: fixed; width: 100%; z-index: 2000; transition: 0.5s; }
        .logo { font-size: 2rem; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 4px; border-left: 5px solid var(--primary); padding-left: 10px; }
        
        .search-container { position: relative; width: 40%; }
        #search-box { width: 100%; padding: 12px 20px; border-radius: 30px; border: none; background: var(--glass); color: white; outline: none; transition: 0.3s; }
        #search-box:focus { background: rgba(255,255,255,0.2); box-shadow: 0 0 15px var(--primary); }

        /* Genre Sidebar/Tabs */
        .genres { padding: 100px 5% 20px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
        .genres::-webkit-scrollbar { display: none; }
        .genre-btn { padding: 8px 25px; border-radius: 20px; background: var(--glass); cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .genre-btn:hover, .genre-btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 20px var(--primary); }

        /* Cinema Grid */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; padding: 20px 5%; }
        .movie-card { position: relative; border-radius: 15px; overflow: hidden; transition: 0.5s; cursor: pointer; background: #111; }
        .movie-card:hover { transform: translateY(-15px) scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,1); }
        .movie-card img { width: 100%; height: 320px; object-fit: cover; }
        
        /* Floating Info Overlay */
        .info-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); opacity: 0; transition: 0.3s; }
        .movie-card:hover .info-overlay { opacity: 1; }

        /* Ultra Video Player */
        #video-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .player-header { position: absolute; top: 0; width: 100%; padding: 20px; background: linear-gradient(rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; align-items: center; z-index: 10000; }
        .back-btn { font-size: 1.5rem; cursor: pointer; background: var(--primary); padding: 5px 20px; border-radius: 5px; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav id="navbar">
    <div class="logo">SPk CINEMA</div>
    <div class="search-container">
        <input type="text" id="search-box" placeholder="Search Worldwide Movies & TV Series..." onkeyup="handleSearch(event)">
    </div>
</nav>

<div class="genres">
    <div class="genre-btn active" onclick="loadCategory('trending')">Trending</div>
    <div class="genre-btn" onclick="loadCategory('28')">Action</div>
    <div class="genre-btn" onclick="loadCategory('35')">Comedy</div>
    <div class="genre-btn" onclick="loadCategory('27')">Horror</div>
    <div class="genre-btn" onclick="loadCategory('10749')">Romance</div>
    <div class="genre-btn" onclick="loadCategory('tv')">TV Series</div>
</div>

<div class="main-grid" id="movie-grid">
    </div>

<div id="video-overlay">
    <div class="player-header">
        <span id="player-title" style="font-weight: bold; font-size: 1.2rem;">Playing Movie...</span>
        <span class="back-btn" onclick="closeCinema()">✕ EXIT CINEMA</span>
    </div>
    <iframe id="cinema-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const moneyLink = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    const imgBase = "https://image.tmdb.org/t/p/w500";

    // 1. Intelligent Search
    async function handleSearch(e) {
        let q = e.target.value;
        if(q.length > 2) {
            let res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`);
            let data = await res.json();
            renderContent(data.results);
        }
    }

    // 2. Global Category Loader
    async function loadCategory(cat) {
        let url = cat === 'trending' ? 
            `https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}` :
            `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${cat}`;
        
        if(cat === 'tv') url = `https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}`;

        let res = await fetch(url);
        let data = await res.json();
        renderContent(data.results);
    }

    function renderContent(items) {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = "";
        items.forEach(m => {
            if(m.poster_path) {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => launchCinema(m.id, m.media_type || 'movie', m.title || m.name);
                card.innerHTML = `
                    <img src="${imgBase + m.poster_path}">
                    <div class="info-overlay">
                        <div style="font-weight:bold">${m.title || m.name}</div>
                        <div style="font-size:0.8rem; color:#aaa">⭐ ${m.vote_average} | ${m.release_date || 'Ongoing'}</div>
                    </div>
                `;
                grid.appendChild(card);
            }
        });
    }

    function launchCinema(id, type, name) {
        // --- AD SYSTEM ---
        alert("Preparing 4K Cinema Stream for " + name + "... Verify on next page.");
        window.open(moneyLink, '_blank');

        // --- PLAYER SYSTEM ---
        setTimeout(() => {
            document.getElementById('player-title').innerText = "Streaming: " + name;
            let src = type === 'tv' ? `https://vidsrc.to/embed/tv/${id}` : `https://vidsrc.to/embed/movie/${id}`;
            document.getElementById('cinema-frame').src = src;
            document.getElementById('video-overlay').style.display = "block";
        }, 2000);
    }

    function closeCinema() {
        document.getElementById('video-overlay').style.display = "none";
        document.getElementById('cinema-frame').src = "";
    }

    window.onload = () => loadCategory('trending');
</script>

</body>
</html>
