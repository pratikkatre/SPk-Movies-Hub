<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk PREMIUM - Experience Cinematic Excellence</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --n-red: #E50914; --bg: #111; --card-w: 160px; --card-h: 240px; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg); color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Premium Floating Navbar */
        nav { background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); padding: 15px 4%; display: flex; align-items: center; justify-content: space-between; position: fixed; width: 100%; z-index: 2000; box-sizing: border-box; }
        .brand { font-size: 2rem; font-weight: 700; color: var(--n-red); text-transform: uppercase; letter-spacing: -1px; }
        .search-bar { width: 40%; position: relative; }
        #search { width: 100%; padding: 10px 15px; border-radius: 4px; border: 1px solid #444; background: rgba(0,0,0,0.7); color: white; outline: none; }
        #search:focus { border-color: #fff; }

        /* Netflix Hero Section */
        .banner { height: 85vh; position: relative; background: linear-gradient(to right, #111 10%, transparent 80%), url('https://image.tmdb.org/t/p/original/69Uqt7vS68p1EBYI7913o9W4mJ7.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; padding-left: 4%; }
        .banner-info h2 { font-size: 3.5rem; margin: 0; }
        .banner-info p { max-width: 450px; font-size: 1.1rem; margin: 20px 0; color: #ccc; }
        .btn-play { background: #fff; color: #000; border: none; padding: 12px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .btn-play:hover { background: rgba(255,255,255,0.8); }

        /* Professional Movie Rows */
        .row { padding: 30px 0 0 4%; }
        .row h3 { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .poster-container { display: flex; overflow-x: scroll; overflow-y: hidden; gap: 12px; padding: 10px 0; }
        .poster-container::-webkit-scrollbar { display: none; }
        
        .movie-card { flex: 0 0 var(--card-w); height: var(--card-h); border-radius: 5px; overflow: hidden; transition: transform 0.4s; cursor: pointer; position: relative; }
        .movie-card:hover { transform: scale(1.1); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .premium-tag { position: absolute; top: 5px; right: 5px; background: var(--n-red); font-size: 0.6rem; padding: 2px 5px; font-weight: bold; border-radius: 3px; }

        /* Full Screen Movie Player */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; }
        .player-bar { position: absolute; top: 0; width: 100%; padding: 20px; background: linear-gradient(rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; align-items: center; z-index: 5001; }
        .close-btn { color: white; font-size: 1.5rem; cursor: pointer; font-weight: bold; background: var(--n-red); padding: 5px 15px; border-radius: 4px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav>
    <div class="brand">SPk PREMIUM</div>
    <div class="search-bar">
        <input type="text" id="search" placeholder="Search Worldwide Titles..." onkeyup="doSearch(event)">
    </div>
</nav>

<div class="banner">
    <div class="banner-info">
        <h2>Trending Masterpiece</h2>
        <p>Unlimited Worldwide movies and series updated daily. Experience it in 4K Quality.</p>
        <button class="btn-play">▶ Play Now</button>
    </div>
</div>

<div class="row" id="search-row" style="display:none;">
    <h3 style="color:var(--n-red)">Results for you</h3>
    <div class="poster-container" id="search-grid"></div>
</div>

<div class="row">
    <h3>Top 10 Worldwide Movies</h3>
    <div class="poster-container" id="trending-movies"></div>
</div>

<div class="row">
    <h3>Trending Web Series</h3>
    <div class="poster-container" id="trending-tv"></div>
</div>

<div class="row">
    <h3>Blockbuster Action</h3>
    <div class="poster-container" id="action-row"></div>
</div>

<div id="player-overlay">
    <div class="player-bar">
        <span id="p-title" style="font-weight: bold;">Now Playing</span>
        <span class="close-btn" onclick="exitPlayer()">✕ CLOSE</span>
    </div>
    <iframe id="p-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const moneyLink = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    const imgUrl = "https://image.tmdb.org/t/p/w342";

    async function fetchList(url, elementId) {
        let r = await fetch(url);
        let d = await r.json();
        const container = document.getElementById(elementId);
        d.results.forEach(m => {
            if(m.poster_path) {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => startStreaming(m.id, m.media_type || 'movie', m.title || m.name);
                card.innerHTML = `
                    <div class="premium-tag">UHD</div>
                    <img src="${imgUrl + m.poster_path}" alt="${m.title || m.name}">
                `;
                container.appendChild(card);
            }
        });
    }

    async function doSearch(e) {
        let q = e.target.value;
        const row = document.getElementById('search-row');
        const grid = document.getElementById('search-grid');
        if(q.length > 2) {
            row.style.display = "block";
            grid.innerHTML = "";
            fetchList(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&query=${q}`, 'search-grid');
        } else {
            row.style.display = "none";
        }
    }

    function startStreaming(id, type, name) {
        // --- MONEY SYSTEM ---
        alert("Preparing 4K Cinematic Feed for: " + name + "\nPlease wait for server connection.");
        window.open(moneyLink, '_blank');

        // --- PLAYER SYSTEM ---
        setTimeout(() => {
            document.getElementById('p-title').innerText = "Streaming: " + name;
            let finalSrc = type === 'tv' ? `https://vidsrc.to/embed/tv/${id}` : `https://vidsrc.to/embed/movie/${id}`;
            document.getElementById('p-frame').src = finalSrc;
            document.getElementById('player-overlay').style.display = "block";
        }, 2000);
    }

    function exitPlayer() {
        document.getElementById('player-overlay').style.display = "none";
        document.getElementById('p-frame').src = "";
    }

    // Load Professional Content
    window.onload = () => {
        fetchList(`https://api.themoviedb.org/3/trending/movie/day?api_key=${KEY}`, 'trending-movies');
        fetchList(`https://api.themoviedb.org/3/trending/tv/day?api_key=${KEY}`, 'trending-tv');
        fetchList(`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_genres=28`, 'action-row');
    };
</script>

</body>
</html>
