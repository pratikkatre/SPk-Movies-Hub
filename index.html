<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Worldwide Netflix Edition</title>
    <style>
        :root { --red: #E50914; --black: #050505; --card-bg: #141414; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Premium Navigation */
        nav { background: rgba(0,0,0,0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 2000; border-bottom: 1px solid #222; box-sizing: border-box; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; }
        
        /* Search Banner */
        .hero { padding: 120px 5% 40px; text-align: center; background: linear-gradient(to bottom, #181818, #050505); }
        .search-container { display: flex; max-width: 700px; margin: 20px auto; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        #query { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; }

        /* Netflix Content Rows */
        .row { padding: 25px 0 0 5%; }
        .row h2 { font-size: 1.4rem; margin-bottom: 15px; border-left: 5px solid var(--red); padding-left: 12px; }
        .posters-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 25px; scroll-behavior: smooth; }
        .posters-scroll::-webkit-scrollbar { display: none; }
        
        /* Cards */
        .card { flex: 0 0 160px; height: 240px; background: var(--card-bg); border-radius: 6px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid #222; position: relative; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: var(--red); box-shadow: 0 10px 40px #000; }
        .card img { width: 100%; height: 100%; object-fit: cover; background: #111; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.65rem; padding: 3px 7px; font-weight: bold; border-radius: 3px; }

        /* Video Theater */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(rgba(0,0,0,0.8), transparent); z-index: 10001; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav><a href="#" class="logo" onclick="location.reload()">SPk ULTIMATE</a></nav>

<div class="hero">
    <h1>UNLIMITED MOVIES & SERIES</h1>
    <div class="search-container">
        <input type="text" id="query" placeholder="Search Netflix, HBO, 18+ Content...">
        <button class="s-btn" onclick="searchGlobal()">SEARCH</button>
    </div>
</div>

<div class="row" id="search-row" style="display:none;">
    <h2 id="s-label" style="color:var(--red);">Search Results</h2>
    <div class="posters-scroll" id="search-grid"></div>
</div>

<div class="row">
    <h2>Trending Globally</h2>
    <div class="posters-scroll" id="trending-grid"></div>
</div>

<div class="row">
    <h2 style="color:#ff4d4d;">🔞 Hot & Adult Shows (18+)</h2>
    <div class="posters-scroll" id="hot-grid"></div>
</div>

<div class="row">
    <h2>Top TV Series</h2>
    <div class="posters-scroll" id="series-grid"></div>
</div>

<div id="theater">
    <div class="t-header">
        <span id="playing-title" style="font-weight: bold; color: var(--red);">4K UHD STREAMING</span>
        <button class="close-btn" onclick="closeT()">✕ EXIT THEATER</button>
    </div>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 

    async function loadData(url, gridId) {
        const grid = document.getElementById(gridId);
        try {
            const res = await fetch(url);
            const data = await res.json();
            data.results.forEach(m => {
                if(m.poster_path) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => playMovie(m.id, m.media_type || (gridId === 'series-grid' ? 'tv' : 'movie'), m.title || m.name);
                    card.innerHTML = `<div class="badge">4K</div><img src="${PROXY + m.poster_path}" loading="lazy">`;
                    grid.appendChild(card);
                }
            });
        } catch(e) { console.log("Connection Busy"); }
    }

    function searchGlobal() {
        const q = document.getElementById('query').value;
        if(q.length < 2) return;
        document.getElementById('search-grid').innerHTML = "";
        document.getElementById('search-row').style.display = "block";
        loadData(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`, 'search-grid');
        window.scrollTo({top: 300, behavior: 'smooth'});
    }

    function playMovie(id, type, name) {
        // EARNINGS: Ad opens in BACKGROUND TAB
        window.open(ADS, '_blank'); 
        
        // MOVIE: Starts immediately in original page
        const theater = document.getElementById('theater');
        const frame = document.getElementById('video-frame');
        document.getElementById('playing-title').innerText = "NOW STREAMING: " + name;
        
        // Using 'vidsrc.me' for highest stability in India/US
        frame.src = type === 'tv' ? `https://vidsrc.me/embed/tv?imdb=${id}` : `https://vidsrc.me/embed/movie?imdb=${id}`;
        theater.style.display = "block";
    }

    function closeT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-frame').src = "";
    }

    window.onload = () => {
        loadData(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`, 'trending-grid');
        loadData(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749&sort_by=popularity.desc`, 'hot-grid');
        loadData(`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}`, 'series-grid');
    };
</script>

</body>
</html>
