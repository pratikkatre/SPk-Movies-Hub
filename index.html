<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk Movies Hub - Ultimate Streaming Experience</title>
    <style>
        :root { --netflix-red: #E50914; --dark-bg: #141414; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* Navbar Style */
        nav { background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); padding: 20px 4%; display: flex; align-items: center; justify-content: space-between; position: fixed; width: 100%; z-index: 1000; box-sizing: border-box; }
        nav h1 { color: var(--netflix-red); font-size: 1.8rem; margin: 0; letter-spacing: 1px; cursor: pointer; }
        .nav-links span { margin-left: 20px; font-size: 0.9rem; cursor: pointer; color: #e5e5e5; }
        .nav-links span:hover { color: #b3b3b3; }

        /* Search Bar Advance */
        .search-box { background: rgba(0,0,0,0.6); border: 1px solid white; color: white; padding: 8px 15px; border-radius: 4px; display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: white; outline: none; width: 200px; }

        /* Hero Banner */
        .hero { height: 80vh; background: linear-gradient(to right, rgba(0,0,0,0.8), transparent), url('https://image.tmdb.org/t/p/original/mBaXZ95O2mB3S5q68K9qiHrS6mC.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 4%; }
        .hero-content { max-width: 600px; }
        .hero-content h2 { font-size: 3.5rem; margin-bottom: 10px; }
        .hero-btn { background: white; color: black; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-right: 10px; font-size: 1.1rem; }
        .hero-btn.info { background: rgba(109, 109, 110, 0.7); color: white; }

        /* Rows */
        .row { padding: 20px 0 20px 4%; }
        .row h2 { font-size: 1.4rem; margin-bottom: 15px; }
        .posters { display: flex; overflow-y: hidden; overflow-x: scroll; scroll-behavior: smooth; padding: 20px 0; }
        .posters::-webkit-scrollbar { display: none; }
        .poster { max-height: 250px; object-fit: contain; margin-right: 15px; transition: transform 450ms; border-radius: 4px; cursor: pointer; }
        .poster:hover { transform: scale(1.08); opacity: 1; }

        /* Full Screen Player */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; }
        .close-player { position: absolute; top: 20px; right: 30px; font-size: 30px; color: white; cursor: pointer; z-index: 5001; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav>
    <h1 onclick="window.location.reload()">SPk MOVIES</h1>
    <div class="nav-links">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search Movies/Series..." onkeyup="handleSearch(event)">
        </div>
    </div>
</nav>

<div class="hero">
    <div class="hero-content">
        <h2>Latest Trending</h2>
        <p>Watch the world's most popular movies and series for free in 4K Ultra HD.</p>
        <button class="hero-btn" onclick="alert('Search a movie below to play!')">Play Now</button>
        <button class="hero-btn info">More Info</button>
    </div>
</div>

<div class="row">
    <h2 id="row-title">Trending Now</h2>
    <div class="posters" id="movie-row">
        </div>
</div>

<div id="player-overlay">
    <span class="close-player" onclick="closePlayer()">&times;</span>
    <iframe id="main-player" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const spkMoneyLink = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    const imgPath = "https://image.tmdb.org/t/p/w500";

    // 1. Initial Load: Get Trending Movies Automatically
    async function loadTrending() {
        const res = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`);
        const data = await res.json();
        displayContent(data.results);
    }

    // 2. Search Functionality
    async function handleSearch(event) {
        const query = event.target.value;
        if (query.length > 2) {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${query}`);
            const data = await res.json();
            document.getElementById('row-title').innerText = "Search Results";
            displayContent(data.results);
        }
    }

    function displayContent(items) {
        const row = document.getElementById('movie-row');
        row.innerHTML = "";
        items.forEach(item => {
            if (item.poster_path) {
                const img = document.createElement('img');
                img.src = imgPath + item.poster_path;
                img.className = "poster";
                img.onclick = () => playMovie(item.id, item.media_type || 'movie');
                row.appendChild(img);
            }
        });
    }

    function playMovie(id, type) {
        // --- Revenue Integration ---
        alert("Initializing High-Speed 4K Stream... Please verify access on the next page.");
        window.open(spkMoneyLink, '_blank');

        // --- Load Player ---
        setTimeout(() => {
            const overlay = document.getElementById('player-overlay');
            const iframe = document.getElementById('main-player');
            let finalUrl = "";
            
            if (type === 'tv') {
                finalUrl = `https://vidsrc.to/embed/tv/${id}`;
            } else {
                finalUrl = `https://vidsrc.to/embed/movie/${id}`;
            }
            
            iframe.src = finalUrl;
            overlay.style.display = "block";
        }, 2000);
    }

    function closePlayer() {
        document.getElementById('player-overlay').style.display = "none";
        document.getElementById('main-player').src = "";
    }

    window.onload = loadTrending;
</script>

</body>
</html>
