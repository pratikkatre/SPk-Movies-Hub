<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - 4K Premium Cinema</title>
    <style>
        :root { --red: #E50914; --black: #050505; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Premium Header */
        header { background: rgba(0,0,0,0.98); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 2000; border-bottom: 2px solid var(--red); box-sizing: border-box; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; }
        
        /* Floating Search Box */
        .search-box { position: relative; width: 100%; max-width: 600px; margin: 10px auto; display: flex; background: #222; border-radius: 5px; border: 1px solid #444; }
        #s-input { flex: 1; padding: 12px; border: none; background: transparent; color: white; outline: none; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }

        .main { padding-top: 100px; }
        .row { padding: 25px 5% 0; text-align: left; }
        .row h2 { font-size: 1.4rem; border-left: 5px solid var(--red); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        
        /* Movie Cards */
        .card { background: #141414; border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: 0.4s; cursor: pointer; position: relative; height: 260px; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: var(--red); box-shadow: 0 0 25px var(--red); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-name { padding: 8px; font-size: 0.8rem; text-align: center; font-weight: bold; height: 50px; display: flex; align-items: center; justify-content: center; }

        /* Multi-Server Player */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); z-index: 10001; box-sizing: border-box; }
        .server-switcher { display: flex; gap: 8px; margin-top: 5px; }
        .s-btn-mini { background: #333; color: white; border: 1px solid #555; padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        .s-btn-mini:hover, .s-btn-mini.active { background: var(--red); border-color: var(--red); }
        iframe { width: 100%; height: 100%; border: none; padding-top: 70px; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">SPk ULTIMATE</a>
    <div class="search-box">
        <input type="text" id="s-input" placeholder="Search 18+ & Global Movies...">
        <button class="s-btn" onclick="localSearch()">SEARCH</button>
    </div>
</header>

<div class="main">
    <div class="row" id="s-row" style="display:none;">
        <h2 style="color: var(--red);">SEARCH RESULTS</h2>
        <div class="grid" id="s-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: #ff4d4d;">🔞 HOT & ADULT GLOBAL (18+)</h2>
        <div class="grid" id="adult-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: gold;">🌍 WORLDWIDE BLOCKBUSTERS</h2>
        <div class="grid" id="movie-grid"></div>
    </div>
</div>

<div id="theater">
    <div class="t-header">
        <div>
            <span id="playing-title" style="font-weight: 900; color: var(--red); font-size: 0.9rem;">STREAMING UHD</span>
            <div class="server-switcher">
                <button class="s-btn-mini active" id="b1" onclick="changeServer(1)">Server 1</button>
                <button class="s-btn-mini" id="b2" onclick="changeServer(2)">Server 2</button>
                <button class="s-btn-mini" id="b3" onclick="changeServer(3)">Server 3</button>
            </div>
        </div>
        <button class="close-btn" onclick="closeT()">✕ CLOSE</button>
    </div>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const P = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    let curID = ""; let curTYP = "";

    // MANUALLY EMBEDDED HIGH-TRAFFIC CONTENT (NO API NEEDED)
    const db = [
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie', cat: 'adult' },
        { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt13008596', t: 'Elite (18+)', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt11126994', t: 'Sex/Life', i: '/8mS2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt16539488', t: 'Godzilla x Kong', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt11389802', t: 'Stree 2', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt15239678', t: 'Dune 2', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt6468322', t: 'Money Heist', i: '/reEMJA1uzpG3SZ0KGbnQn76vQ4l.jpg', type: 'tv', cat: 'movie' }
    ];

    function renderGrid(data, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "";
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openT(m.id, m.type, m.t);
            card.innerHTML = `<img src="${P + m.i}"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function localSearch() {
        const q = document.getElementById('s-input').value.toLowerCase();
        if(!q) return;
        const res = db.filter(m => m.t.toLowerCase().includes(q));
        document.getElementById('s-row').style.display = "block";
        renderGrid(res, 's-grid');
        window.scrollTo({top: 120, behavior: 'smooth'});
    }

    function openT(id, type, title) {
        window.open(ADS, '_blank'); // Dollar Link
        curID = id; curTYP = type;
        document.getElementById('playing-title').innerText = title;
        document.getElementById('theater').style.display = "block";
        changeServer(1);
    }

    function changeServer(s) {
        const f = document.getElementById('v-frame');
        document.querySelectorAll('.s-btn-mini').forEach(b => b.classList.remove('active'));
        document.getElementById('b' + s).classList.add('active');
        
        let url = "";
        if(s === 1) url = `https://vidsrc.me/embed/`;
        if(s === 2) url = `https://vidsrc.xyz/embed/`;
        if(s === 3) url = `https://autoembed.to/`;

        f.src = url + (curTYP === 'tv' ? (s === 3 ? `tv/imdb/${curID}` : `tv?imdb=${curID}`) : (s === 3 ? `movie/imdb/${curID}` : `movie?imdb=${curID}`));
    }

    function closeT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => {
        renderGrid(db.filter(m => m.cat === 'adult'), 'adult-grid');
        renderGrid(db.filter(m => m.cat === 'movie'), 'movie-grid');
    };
</script>

</body>
</html>
