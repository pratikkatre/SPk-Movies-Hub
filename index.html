<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk Movies Hub - Stream 4K Movies</title>
    <style>
        /* Modern Netflix-like Black Theme */
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #141414; 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
        }

        /* Fixed Header Style */
        header { 
            padding: 20px; 
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 10%, rgba(0,0,0,0) 100%);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        h1 { 
            color: #E50914; /* Netflix Red */
            margin: 0; 
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-content {
            padding-top: 100px; /* Space for fixed header */
        }

        /* Movie Grid Layout */
        .movie-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Professional Movie Card */
        .movie-card { 
            background: #1a1a1a; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
            cursor: pointer;
            position: relative;
        }

        /* Hover Effect */
        .movie-card:hover { 
            transform: scale(1.08); 
            box-shadow: 0 8px 16px rgba(0,0,0,0.7);
            z-index: 10;
        }

        /* High Quality Poster Image */
        .movie-card img { 
            width: 100%; 
            height: 300px; /* Fixed height for uniformity */
            object-fit: cover; /* Ensures image fills space without stretching */
            border-bottom: 2px solid #333;
        }

        .movie-details {
            padding: 15px;
            text-align: left;
        }

        .movie-details h3 { 
            margin: 0; 
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Truncates long titles */
        }

        .movie-details p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: #b3b3b3;
        }

        /* Red "Play" Button */
        .play-btn { 
            background: #E50914; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px; 
            width: 100%; 
            font-size: 1rem;
            transition: background 0.2s ease;
        }

        .play-btn:hover { 
            background: #f40612; 
        }

    </style>
</head>

<header>

        </div>
</div>
