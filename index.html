<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Real Netflix Experience</title>
    <style>
        :root { --red: #E50914; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Netflix Premium Navbar */
        nav { background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 2000; box-sizing: border-box; }
        .logo { color: var(--red); font-size: 2rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; }

        /* Hero Section */
        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.4), var(--black)), url('https://w0.peakpx.com/wallpaper/521/11/HD-wallpaper-stree-2-movie-poster.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .search-box { display: flex; width: 90%; max-width: 700px; background: rgba(0,0,0,0.7); border-radius: 4px; border: 1px solid #555; overflow: hidden; }
        #s-input { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; font-size: 1.1rem; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; }

        /* Professional Content Rows */
        .row { padding: 30px 0 0 5%; margin-top: -30px; }
        .row h2 { font-size: 1.5rem; margin-bottom: 15px; border-left: 5px solid var(--red); padding-left: 15px; }
        .rail { display: flex; overflow-x: scroll; gap: 15px; padding-bottom: 30px; scrollbar-width: none; }
        .rail::-webkit-scrollbar { display: none; }
        
        /* Real Netflix Cards */
        .card { flex: 0 0 160px; height: 240px; background: #141414; border-radius: 4px; overflow: hidden; transition: 0.4s; cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.1); z-index: 100; box-shadow: 0 10px 40px #000; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 0; background: var(--red); font-size: 0.6rem; padding: 3px 8px; font-weight: bold; border-radius: 0 3px 3px 0; }

        /* Integrated Cinema Player */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(rgba(0,0,0,0.9), transparent); z-index: 10001; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">SPk ULTIMATE</a></nav>

<div class="hero">
    <h1 style="font-size: 3rem; margin-bottom: 10px;">Unlimited Movies & More</h1>
    <div class="search-box">
        <input type="text" id="s-input" placeholder="Search Netflix, Webseries, 18+...">
        <button class="s-btn" onclick="masterSearch()">SEARCH</button>
    </div>
</div>

<div class="row" id="s-row" style="display:none;"><h2 style="color:var(--red);">Search Results</h2><div class="rail" id="s-grid"></div></div>

<div class="row">
    <h2 style="color: #ff4d4d;">🔞 Hot & Adult Trends (18+)</h2>
    <div class="rail" id="adult-rail"></div>
</div>

<div class="row">
    <h2 style="color: gold;">🌍 Global Blockbusters</h2>
    <div class="rail" id="movie-rail"></div>
</div>

<div id="theater">
    <div class="t-header">
        <span id="p-title" style="font-weight: 900; color: var(--red); text-transform: uppercase;">Streaming UHD</span>
        <button class="close-btn" onclick="exitT()">✕ CLOSE</button>
    </div>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 

    async function loadNetflix(url, gridId) {
        const grid = document.getElementById(gridId);
        try {
            const res = await fetch(url);
            const data = await res.json();
            data.results.forEach(m => {
                if(m.poster_path) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => playMovie(m.id, m.media_type || (gridId==='adult-rail'?'movie':'movie'), m.title || m.name);
                    card.innerHTML = `<div class="badge">TOP 10</div><img src="${PROXY + m.poster_path}" onerror="this.src='https://via.placeholder.com/200x300/111/fff?text=${m.title||m.name}'">`;
                    grid.appendChild(card);
                }
            });
        } catch(e) {}
    }

    function masterSearch() {
        const q = document.getElementById('s-input').value;
        if(!q) return;
        document.getElementById('s-grid').innerHTML = "";
        document.getElementById('s-row').style.display = "block";
        loadNetflix(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`, 's-grid');
    }

    function playMovie(id, type, name) {
        // Step 1: Open Ad in new tab
        window.open(ADS, '_blank'); 
        
        // Step 2: Immediate Play in original tab
        const theater = document.getElementById('theater');
        const frame = document.getElementById('v-frame');
        document.getElementById('p-title').innerText = "PLAYING: " + name;
        
        // Fix for Dhurandhar & Indian Content - Using VidSrc PRO
        frame.src = `https://vidsrc.pro/embed/${type}/${id}`;
        theater.style.display = "block";
    }

    function exitT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => {
        // Global Automated Injections
        loadNetflix(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749&sort_by=popularity.desc`, 'adult-rail');
        loadNetflix(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`, 'movie-rail');
    };
</script>

</body>
</html>
