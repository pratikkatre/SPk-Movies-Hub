<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Worldwide Streaming Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E50914; --black: #080808; --card-bg: #141414; }
        body { font-family: 'Roboto', sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Netflix-Style Header */
        header { background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; position: fixed; width: 100%; z-index: 2000; box-sizing: border-box; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
        
        .nav-categories { display: flex; gap: 15px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .nav-categories span { cursor: pointer; transition: 0.3s; }
        .nav-categories span:hover { color: var(--red); }

        /* Powerful Search Engine */
        .search-hero { padding: 100px 5% 30px; text-align: center; background: #000; }
        .search-bar { display: flex; max-width: 600px; margin: 0 auto; background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #444; }
        #query { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
        .s-btn { background: var(--red); border: none; color: white; padding: 0 25px; font-weight: bold; cursor: pointer; }

        /* Content Rows */
        .row { padding: 30px 0 0 5%; }
        .row h2 { font-size: 1.3rem; margin-bottom: 15px; border-left: 5px solid var(--red); padding-left: 10px; }
        .posters-container { display: flex; overflow-x: scroll; gap: 15px; padding-bottom: 20px; scroll-behavior: smooth; }
        .posters-container::-webkit-scrollbar { display: none; }
        
        /* Premium Movie Cards */
        .movie-card { flex: 0 0 160px; height: 240px; background: var(--card-bg); border-radius: 5px; overflow: hidden; position: relative; transition: 0.4s; cursor: pointer; }
        .movie-card:hover { transform: scale(1.1); z-index: 100; box-shadow: 0 10px 30px #000; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-tag { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.6rem; padding: 3px 6px; font-weight: bold; border-radius: 3px; }

        /* Full Cinema Theater (Player) */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .theater-nav { position: absolute; top: 0; width: 100%; padding: 20px; background: linear-gradient(rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">SPk CINEMA</div>
    <div class="nav-categories">
        <span onclick="fetchGenre(28, 'Action Blockbusters')">Action</span>
        <span onclick="fetchGenre(27, 'Horror Nights')">Horror</span>
        <span onclick="fetchGenre(35, 'Comedy Hits')">Comedy</span>
        <span onclick="fetchGenre(878, 'Sci-Fi World')">Sci-Fi</span>
        <span onclick="loadSection('tv', 'Trending Series')">Series</span>
    </div>
</header>

<div class="search-hero">
    <div class="search-bar">
        <input type="text" id="query" placeholder="Search any movie or series worldwide...">
        <button class="s-btn" onclick="searchMaster()">SEARCH</button>
    </div>
</div>

<div class="row" id="search-row" style="display:none;">
    <h2 id="search-title">Search Results</h2>
    <div class="posters-container" id="search-grid"></div>
</div>

<div class="row">
    <h2 id="dynamic-title">Worldwide Trending</h2>
    <div class="posters-container" id="main-grid"></div>
</div>

<div class="row">
    <h2>Popular TV Series</h2>
    <div class="posters-container" id="series-grid"></div>
</div>

<div id="theater">
    <div class="theater-nav">
        <span id="playing-now" style="font-weight: bold; color: var(--red);">STREAMING 4K CONTENT</span>
        <button class="close-btn" onclick="exitTheater()">✕ CLOSE THEATER</button>
    </div>
    <iframe id="video-iframe" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    const IMG_PATH = "https://image.tmdb.org/t/p/w500";

    // 1. Unified Content Loader
    async function loadSection(type, title, gridId = 'main-grid') {
        const url = `https://api.themoviedb.org/3/trending/${type}/week?api_key=${API_KEY}`;
        document.getElementById('dynamic-title').innerText = title;
        fetchAndRender(url, gridId);
    }

    // 2. Genre Specific Filter (Like Netflix Categories)
    async function fetchGenre(id, title) {
        const url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`;
        document.getElementById('dynamic-title').innerText = title;
        fetchAndRender(url, 'main-grid');
        window.scrollTo({ top: 350, behavior: 'smooth' });
    }

    // 3. Global Search System
    async function searchMaster() {
        const q = document.getElementById('query').value;
        if(q.length < 2) return;
        document.getElementById('search-row').style.display = "block";
        fetchAndRender(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`, 'search-grid');
        window.scrollTo({ top: 350, behavior: 'smooth' });
    }

    // 4. Rendering Engine
    async function fetchAndRender(url, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "<p style='padding:20px;'>Loading Magic...</p>";
        const res = await fetch(url);
        const data = await res.json();
        grid.innerHTML = "";
        data.results.forEach(m => {
            if(m.poster_path) {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => launchMovie(m.id, m.media_type || 'movie', m.title || m.name);
                card.innerHTML = `
                    <div class="card-tag">4K</div>
                    <img src="${IMG_PATH + m.poster_path}">
                `;
                grid.appendChild(card);
            }
        });
    }

    // 5. THE REAL PLAYER (Worldwide Playback)
    function launchMovie(id, type, name) {
        alert("Initializing High-Speed Stream for: " + name + "\nConnecting to Global Server...");
        window.open(ADS, '_blank'); // Earnings
        
        setTimeout(() => {
            const theater = document.getElementById('theater');
            const frame = document.getElementById('video-iframe');
            document.getElementById('playing-now').innerText = "PLAYING: " + name;
            
            // This URL fetches the REAL movie/series from worldwide servers
            let streamUrl = type === 'tv' ? `https://vidsrc.to/embed/tv/${id}` : `https://vidsrc.to/embed/movie/${id}`;
            frame.src = streamUrl;
            theater.style.display = "block";
        }, 1500);
    }

    function exitTheater() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-iframe').src = "";
    }

    window.onload = () => {
        loadSection('movie', 'Worldwide Trending Movies', 'main-grid');
        loadSection('tv', 'Popular TV Series', 'series-grid');
    };
</script>

</body>
</html>
