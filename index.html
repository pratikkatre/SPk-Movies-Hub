<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - 4K Premium Access</title>
    <style>
        :root { --red: #E50914; --black: #050505; --gray: #1a1a1a; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Fixed Header */
        header { background: #000; padding: 12px 5%; border-bottom: 2px solid var(--red); position: fixed; width: 100%; z-index: 2000; box-sizing: border-box; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; display: block; text-align: center; }

        /* Powerful Global Search */
        .search-area { padding-top: 80px; text-align: center; background: #000; padding-bottom: 20px; }
        .s-box { display: flex; max-width: 600px; margin: 0 auto; background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #444; }
        #s-input { flex: 1; padding: 12px; border: none; background: transparent; color: white; outline: none; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; }

        /* Row Layout */
        .row { padding: 25px 5% 0; }
        .row h2 { font-size: 1.3rem; margin-bottom: 15px; border-left: 5px solid var(--red); padding-left: 12px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        
        /* Netflix Premium Cards */
        .card { background: var(--gray); border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; position: relative; height: 260px; }
        .card:hover { transform: scale(1.05); border-color: var(--red); z-index: 100; box-shadow: 0 0 20px var(--red); }
        .card img { width: 100%; height: 210px; object-fit: cover; background: #111; }
        .card-name { padding: 10px; font-size: 0.8rem; text-align: center; font-weight: bold; height: 50px; display: flex; align-items: center; justify-content: center; }
        .tag { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.6rem; padding: 3px 8px; font-weight: bold; border-radius: 4px; }

        /* Cinema Theater */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.95); z-index: 10001; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .server-wrap { display: flex; gap: 10px; margin-top: 5px; }
        .s-opt { background: #333; color: white; border: 1px solid #555; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .s-opt.active { background: var(--red); }
        iframe { width: 100%; height: 100%; border: none; padding-top: 65px; box-sizing: border-box; }
    </style>
</head>
<body>

<header><a href="#" class="logo">SPk ULTIMATE</a></header>

<div class="search-area">
    <div class="s-box">
        <input type="text" id="s-input" placeholder="Search 8,00,000+ Movies, 18+, Webseries...">
        <button class="s-btn" onclick="masterSearch()">SEARCH</button>
    </div>
</div>

<div class="main-body">
    <div class="row" id="search-row" style="display:none;">
        <h2 style="color: var(--red);">SEARCH RESULTS</h2>
        <div class="grid" id="search-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: #ff4d4d;">🔞 GLOBAL 18+ & HOT</h2>
        <div class="grid" id="adult-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: gold;">🌍 WORLDWIDE TRENDING</h2>
        <div class="grid" id="movie-grid"></div>
    </div>
</div>

<div id="theater">
    <div class="t-header">
        <div>
            <span id="playing-now" style="font-weight: 900; color: var(--red); font-size: 0.9rem;">LOADING 4K UHD...</span>
            <div class="server-wrap">
                <button class="s-opt active" id="b1" onclick="switchS(1)">SERVER 1</button>
                <button class="s-opt" id="b2" onclick="switchS(2)">SERVER 2</button>
            </div>
        </div>
        <button class="close-btn" onclick="exitT()">✕ EXIT</button>
    </div>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    // New Image Proxy to bypass ISP block
    const P = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 
    let activeID = ""; let activeTYP = "";

    // Hard-Coded Fallback Database (If Search Fails)
    const db = [
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie', cat: 'adult' },
        { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt11126994', t: 'Sex/Life', i: '/8mS2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt11389802', t: 'Stree 2', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt15239678', t: 'Dune 2', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie', cat: 'movie' }
    ];

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "";
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => play(m.id, m.type, m.t);
            // Dynamic image loading with fallback
            card.innerHTML = `<div class="tag">4K</div><img src="${P + m.i}" onerror="this.src='https://via.placeholder.com/200x300/E50914/FFFFFF?text=${m.t}'"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function masterSearch() {
        const q = document.getElementById('s-input').value.toLowerCase();
        if(!q) return;
        const res = db.filter(m => m.t.toLowerCase().includes(q));
        document.getElementById('search-row').style.display = "block";
        render(res, 'search-grid');
    }

    function play(id, type, name) {
        window.open(ADS, '_blank'); 
        activeID = id; activeTYP = type;
        document.getElementById('playing-now').innerText = "NOW STREAMING: " + name;
        document.getElementById('theater').style.display = "block";
        switchS(1);
    }

    function switchS(s) {
        const f = document.getElementById('v-frame');
        document.querySelectorAll('.s-opt').forEach(b => b.classList.remove('active'));
        document.getElementById('b' + s).classList.add('active');
        
        // Multi-Path Servers (If Server 1 fails, Server 2 works)
        let url = (s === 1) ? `https://vidsrc.xyz/embed/` : `https://autoembed.to/`;
        let path = (activeTYP === 'tv') ? (s === 2 ? `tv/imdb/${activeID}` : `tv?imdb=${activeID}`) : (s === 2 ? `movie/imdb/${activeID}` : `movie?imdb=${activeID}`);
        f.src = url + path;
    }

    function exitT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => {
        render(db.filter(m => m.cat === 'adult'), 'adult-grid');
        render(db.filter(m => m.cat === 'movie'), 'movie-grid');
    };
</script>

</body>
</html>
