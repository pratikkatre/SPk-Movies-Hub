<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - 4K Premium Cinema</title>
    <style>
        :root { --red: #E50914; --black: #050505; }
        body { font-family: 'Arial', sans-serif; background: var(--black); color: white; margin: 0; padding: 0; text-align: center; }
        
        /* Netflix Nav */
        nav { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }

        /* Rows */
        .row { padding: 30px 5% 0; text-align: left; }
        .row h2 { font-size: 1.3rem; border-left: 5px solid var(--red); padding-left: 12px; margin-bottom: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        /* Cards */
        .card { background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.05); border-color: var(--red); box-shadow: 0 0 15px var(--red); }
        .card img { width: 100%; height: 210px; object-fit: cover; background: #222; }
        .card-name { padding: 10px; font-size: 0.8rem; text-align: center; font-weight: bold; min-height: 40px; }

        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: var(--red); color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav><div class="logo">SPk ULTIMATE</div></nav>

    function render(list, gridId) {
        const grid = document.getElementById(gridId);

    function exitT() {

    window.onload = () => { render(data.trending, 'main-grid'); render(data.hot, 'hot-grid'); };
</script>

</html>
