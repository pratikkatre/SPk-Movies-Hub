<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - 4K Premium Movies & 18+</title>
    <style>
        :root { --red: #E50914; --black: #050505; --gray: #141414; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Premium Navigation & Search */
        header { background: rgba(0,0,0,0.95); padding: 15px 5%; display: flex; flex-direction: column; align-items: center; position: fixed; width: 100%; z-index: 2000; border-bottom: 2px solid var(--red); box-sizing: border-box; gap: 12px; }
        .logo-row { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .logo { color: var(--red); font-size: 2rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; text-shadow: 0 0 15px rgba(229, 9, 20, 0.6); }
        .search-bar { display: flex; width: 100%; max-width: 800px; background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #444; }
        #search-input { flex: 1; padding: 14px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
        .search-btn { background: var(--red); color: white; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* Main Content Layout */
        .content { padding-top: 160px; }
        .row { padding: 25px 5% 0; }
        .row h2 { font-size: 1.6rem; margin-bottom: 18px; border-left: 6px solid var(--red); padding-left: 15px; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 20px; }
        
        /* Netflix Style Poster Cards */
        .card { background: var(--gray); border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: var(--red); box-shadow: 0 15px 45px rgba(0,0,0,0.9); }
        .card img { width: 100%; height: 250px; object-fit: cover; background: #111; display: block; }
        .card-info { padding: 12px; font-size: 0.9rem; text-align: center; font-weight: 600; min-height: 45px; display: flex; align-items: center; justify-content: center; background: linear-gradient(to top, #000, #141414); }
        .quality-tag { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 0.65rem; padding: 4px 8px; font-weight: bold; border-radius: 4px; box-shadow: 0 0 10px #000; z-index: 10; }

        /* Full Screen Movie Player */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .player-header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(rgba(0,0,0,0.95), transparent); z-index: 10001; box-sizing: border-box; }
        .close-player { background: var(--red); color: white; border: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 0 15px var(--red); }
        .server-list { display: flex; gap: 15px; margin-top: 12px; }
        .server-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 18px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .server-btn:hover, .server-btn.active { background: var(--red); border-color: var(--red); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-row">
        <a href="#" class="logo" onclick="location.reload()">SPk ULTIMATE</a>
        <span style="color: gold; font-weight: bold; font-size: 0.8rem;">4K ULTRA HD MODE</span>
    </div>
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search 1,000,000+ Movies, Webseries & Hot Content...">
        <button class="search-btn" onclick="executeSearch()">SEARCH</button>
    </div>
</header>

<div class="content">
    <div class="row" id="search-section" style="display:none;">
        <h2 style="color: var(--red);">Search Results</h2>
        <div class="grid" id="search-results"></div>
    </div>

    <div class="row">
        <h2 style="color: #ff4d4d;">🔞 Worldwide Hot & Adult (18+)</h2>
        <div class="grid" id="hot-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: gold;">🌍 Global Trending Movies</h2>
        <div class="grid" id="movie-grid"></div>
    </div>

    <div class="row">
        <h2>📺 Premium Web Series</h2>
        <div class="grid" id="tv-grid"></div>
    </div>
</div>

<div id="player-overlay">
    <div class="player-header">
        <div>
            <span id="now-playing" style="font-weight: 900; color: var(--red); font-size: 1.2rem;">STREAMING UHD</span>
            <div class="server-list">
                <button class="server-btn active" id="s1" onclick="switchSource(1)">SERVER 1</button>
                <button class="server-btn" id="s2" onclick="switchSource(2)">SERVER 2</button>
            </div>
        </div>
        <button class="close-player" onclick="exitPlayer()">✕ CLOSE</button>
    </div>
    <iframe id="main-iframe" src="" allowfullscreen></iframe>
</div>

<script>
    const KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    // The "Magic Proxy" for Posters
    const IMAGE_PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const AD_URL = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 
    let activeID = ""; let activeTYPE = "";

    async function loadNetflixData(apiUrl, gridId) {
        const grid = document.getElementById(gridId);
        try {
            const res = await fetch(apiUrl);
            const data = await res.json();
            data.results.forEach(item => {
                if(item.poster_path) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => launchTheater(item.id, item.media_type || (gridId==='tv-grid'?'tv':'movie'), item.title || item.name);
                    card.innerHTML = `
                        <div class="quality-tag">4K</div>
                        <img src="${IMAGE_PROXY + item.poster_path}" alt="Poster">
                        <div class="card-info">${item.title || item.name}</div>
                    `;
                    grid.appendChild(card);
                }
            });
        } catch(err) { console.error("API Delay"); }
    }

    function executeSearch() {
        const query = document.getElementById('search-input').value;
        if(query.length < 2) return;
        const grid = document.getElementById('search-results');
        grid.innerHTML = "";
        document.getElementById('search-section').style.display = "block";
        loadNetflixData(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&query=${query}`, 'search-results');
        window.scrollTo({top: 200, behavior: 'smooth'});
    }

    function launchTheater(id, type, title) {
        window.open(AD_URL, '_blank'); // Dollar revenue starts
        activeID = id; activeTYPE = type;
        document.getElementById('now-playing').innerText = "NOW PLAYING: " + title;
        document.getElementById('player-overlay').style.display = "block";
        switchSource(1);
    }

    function switchSource(s) {
        const frame = document.getElementById('main-iframe');
        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('s' + s).classList.add('active');
        
        let provider = (s === 1) ? `https://vidsrc.me/embed/` : `https://vidsrc.xyz/embed/`;
        frame.src = provider + (activeTYPE === 'tv' ? `tv?imdb=${activeID}` : `movie?imdb=${activeID}`);
    }

    function exitPlayer() {
        document.getElementById('player-overlay').style.display = "none";
        document.getElementById('main-iframe').src = "";
    }

    window.onload = () => {
        // Adult/Romantic (10749) for Global Traffic
        loadNetflixData(`https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_genres=10749&sort_by=popularity.desc`, 'hot-grid');
        loadNetflixData(`https://api.themoviedb.org/3/trending/movie/week?api_key=${KEY}`, 'movie-grid');
        loadNetflixData(`https://api.themoviedb.org/3/trending/tv/week?api_key=${KEY}`, 'tv-grid');
    };
</script>

</body>
</html>
