<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Premium 4K</title>
    <style>
        :root { --red: #E50914; --black: #050505; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; }
        header { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; }
        .row { padding: 25px 5% 0; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { background: #141414; border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.4s; cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: var(--red); box-shadow: 0 0 20px var(--red); }
        .card img { width: 100%; height: 220px; object-fit: cover; background: #222; }
        .card-name { padding: 10px; font-size: 0.8rem; text-align: center; font-weight: bold; }
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); z-index: 10001; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; padding-top: 60px; box-sizing: border-box; }
        .server-switcher { display: flex; gap: 10px; margin-top: 5px; }
        .s-btn { background: #333; color: white; border: 1px solid #555; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .s-btn.active { background: var(--red); }
    </style>
</head>
<body>

<header><a href="#" class="logo">SPk ULTIMATE</a></header>

<div class="row">
    <h2 style="color: #ff4d4d;">🔞 PREMIUM ADULT & HOT</h2>
    <div class="grid" id="adult-grid"></div>
</div>

<div class="row">
    <h2 style="color: gold;">🌍 GLOBAL BLOCKBUSTERS</h2>
    <div class="grid" id="movie-grid"></div>
</div>

<div id="theater">
    <div class="t-header">
        <div>
            <span id="playing-title" style="font-weight: 900; color: var(--red);">STREAMING 4K UHD</span>
            <div class="server-switcher">
                <button class="s-btn active" id="b1" onclick="switchS(1)">SERVER 1</button>
                <button class="s-btn" id="b2" onclick="switchS(2)">SERVER 2</button>
            </div>
        </div>
        <button class="close-btn" onclick="exitT()">✕ EXIT</button>
    </div>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const P = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 
    let activeID = ""; let activeTYP = "";

    const db = [
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie', cat: 'adult' },
        { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt11126994', t: 'Sex/Life', i: '/8mS2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt11389802', t: 'Stree 2', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt15239678', t: 'Dune 2', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie', cat: 'movie' }
    ];

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => play(m.id, m.type, m.t);
            card.innerHTML = `<img src="${P + m.i}"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function play(id, type, name) {
        window.open(ADS, '_blank'); // Earning Start
        activeID = id; activeTYP = type;
        document.getElementById('playing-title').innerText = name;
        document.getElementById('theater').style.display = "block";
        switchS(1);
    }

    function switchS(s) {
        const f = document.getElementById('v-frame');
        document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('b' + s).classList.add('active');
        
        // SERVER 1 is VIDSRC.PRO (Best for India)
        // SERVER 2 is VIDSRC.TO (Best for US/Global)
        let base = (s === 1) ? `https://vidsrc.pro/embed/` : `https://vidsrc.to/embed/`;
        f.src = base + (activeTYP === 'tv' ? `tv/${activeID}` : `movie/${activeID}`);
    }

    function exitT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => {
        render(db.filter(m => m.cat === 'adult'), 'adult-grid');
        render(db.filter(m => m.cat === 'movie'), 'movie-grid');
    };
</script>

</body>
</html>
