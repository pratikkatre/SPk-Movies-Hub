<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - 4K Premium</title>
    <style>
        :root { --red: #E50914; --black: #050505; }
        body { font-family: 'Arial', sans-serif; background: var(--black); color: white; margin: 0; padding: 0; text-align: center; }
        nav { background: #000; padding: 15px; border-bottom: 2px solid var(--red); color: var(--red); font-size: 1.5rem; font-weight: 900; position: sticky; top: 0; z-index: 1000; }
        .row { padding: 25px 5%; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: #111; border-radius: 8px; border: 1px solid #333; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { transform: scale(1.05); border-color: var(--red); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-name { padding: 8px; font-size: 0.8rem; text-align: center; font-weight: bold; }
        
        /* Fixed Theater Mode */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-controls { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 10001; }
        .btn { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .server-btn { background: #333; margin-left: 5px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav>SPk ULTIMATE</nav>

<div class="row">
    <h2>🔥 GLOBAL TRENDING</h2>
    <div class="grid" id="trending-grid"></div>
</div>

<div class="row">
    <h2 style="color: #ff4d4d;">🔞 PREMIUM 18+</h2>
    <div class="grid" id="adult-grid"></div>
</div>

<div id="theater">
    <div class="t-controls">
        <div>
            <button class="btn server-btn" onclick="switchS(1)">Server 1</button>
            <button class="btn server-btn" onclick="switchS(2)">Server 2</button>
        </div>
        <button class="btn" onclick="closeT()">✕ CLOSE</button>
    </div>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    let currentIMDB = ""; let currentType = "";

    const movies = {
        trending: [
            { id: 'tt16539488', t: 'Godzilla x Kong', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie' },
            { id: 'tt11389802', t: 'Stree 2', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie' },
            { id: 'tt15239678', t: 'Dune 2', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie' }
        ],
        adult: [
            { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie' },
            { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv' },
            { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv' }
        ]
    };

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openT(m.id, m.type);
            card.innerHTML = `<img src="${PROXY + m.i}"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function openT(id, type) {
        currentIMDB = id; currentType = type;
        // THE TRICK: Open ad in a new tab so your site stays open!
        window.open(ADS, '_blank');
        
        document.getElementById('theater').style.display = "block";
        switchS(1);
    }

    function switchS(s) {
        const f = document.getElementById('video-frame');
        // Use vidsrc.xyz or vidsrc.pro for higher reliability in India
        let base = (s === 1) ? `https://vidsrc.xyz/embed/` : `https://vidsrc.pro/embed/`;
        f.src = base + (currentType === 'tv' ? `tv?imdb=${currentIMDB}` : `movie?imdb=${currentIMDB}`);
    }

    function closeT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-frame').src = "";
    }

    window.onload = () => { render(movies.trending, 'trending-grid'); render(movies.adult, 'adult-grid'); };
</script>
</body>
</html>
