<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Worldwide Cinema</title>
    <style>
        :root { --red: #E50914; --black: #050505; --gray: #141414; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Fixed Header with Search */
        header { background: rgba(0,0,0,0.95); padding: 10px 5%; display: flex; flex-direction: column; align-items: center; position: fixed; width: 100%; z-index: 2000; border-bottom: 2px solid var(--red); box-sizing: border-box; gap: 10px; }
        .nav-top { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .logo { color: var(--red); font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; cursor: pointer; text-decoration: none; }
        
        /* Enhanced Search Bar */
        .search-box { display: flex; width: 100%; max-width: 600px; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        #s-input { flex: 1; padding: 12px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }

        /* Rows Layout */
        .content-area { padding-top: 140px; }
        .row { padding: 20px 5% 0; }
        .row h2 { font-size: 1.3rem; margin-bottom: 15px; border-left: 5px solid var(--red); padding-left: 12px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        /* Netflix Cards */
        .card { background: var(--gray); border-radius: 6px; overflow: hidden; border: 1px solid #222; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.08); border-color: var(--red); z-index: 100; }
        .card img { width: 100%; height: 210px; object-fit: cover; background: #1a1a1a; }
        .card-name { padding: 8px; font-size: 0.75rem; text-align: center; font-weight: bold; min-height: 30px; display: flex; align-items: center; justify-content: center; }
        .badge { position: absolute; top: 8px; right: 8px; background: var(--red); font-size: 0.6rem; padding: 2px 5px; font-weight: bold; border-radius: 3px; }

        /* Full Screen Cinema Player */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(rgba(0,0,0,0.9), transparent); z-index: 10001; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <a href="#" class="logo" onclick="location.reload()">SPk ULTIMATE</a>
        <span style="font-size: 0.7rem; color: #888;">GLOBAL 4K STREAMING</span>
    </div>
    <div class="search-box">
        <input type="text" id="s-input" placeholder="Search Movies, Webseries, 18+ Content...">
        <button class="s-btn" onclick="performSearch()">SEARCH</button>
    </div>
</header>

<div class="content-area">
    <div class="row" id="search-row" style="display:none;">
        <h2 style="color: var(--red);">Found for You</h2>
        <div class="grid" id="search-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: #ff4d4d;">🔞 Hot & Adult Trends</h2>
        <div class="grid" id="hot-grid"></div>
    </div>

    <div class="row">
        <h2 style="color: gold;">🌍 Global Trending Movies</h2>
        <div class="grid" id="main-grid"></div>
    </div>

    <div class="row">
        <h2>📺 Top Web Series</h2>
        <div class="grid" id="tv-grid"></div>
    </div>
</div>

<div id="theater">
    <div class="t-header">
        <span id="playing-title" style="font-weight: bold; color: var(--red);">LOADING 4K UHD...</span>
        <button class="close-btn" onclick="closeCinema()">✕ EXIT THEATER</button>
    </div>
    <iframe id="video-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = '844dba0bfd443a56f92d74a0d0d88b03';
    const PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; // Your Earnings Link

    async function loadData(url, gridId) {
        const grid = document.getElementById(gridId);
        try {
            const res = await fetch(url);
            const data = await res.json();
            data.results.forEach(m => {
                if(m.poster_path) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => playMovie(m.id, m.media_type || (gridId==='tv-grid'?'tv':'movie'), m.title || m.name);
                    const poster = `${PROXY}${m.poster_path}`;
                    card.innerHTML = `<div class="badge">4K</div><img src="${poster}" loading="lazy"><div class="card-name">${m.title || m.name}</div>`;
                    grid.appendChild(card);
                }
            });
        } catch(e) { console.log("Network Busy"); }
    }

    function performSearch() {
        const q = document.getElementById('s-input').value;
        if(q.length < 2) return;
        const grid = document.getElementById('search-grid');
        grid.innerHTML = "";
        document.getElementById('search-row').style.display = "block";
        loadData(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`, 'search-grid');
        window.scrollTo({top: 150, behavior: 'smooth'});
    }

    function playMovie(id, type, name) {
        // EARNINGS: Ad opens in a NEW Tab (Background)
        window.open(ADS, '_blank'); 
        
        // MOVIE: Starts playing immediately without blocking
        const theater = document.getElementById('theater');
        const frame = document.getElementById('video-frame');
        document.getElementById('playing-title').innerText = "STREAMING: " + name;
        
        // Anti-Block Direct Player (vidsrc.me is stable in India)
        frame.src = type === 'tv' ? `https://vidsrc.me/embed/tv?imdb=${id}` : `https://vidsrc.me/embed/movie?imdb=${id}`;
        theater.style.display = "block";
    }

    function closeCinema() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('video-frame').src = "";
    }

    window.onload = () => {
        loadData(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749&sort_by=popularity.desc`, 'hot-grid');
        loadData(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`, 'main-grid');
        loadData(`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}`, 'tv-grid');
    };
</script>

</body>
</html>
