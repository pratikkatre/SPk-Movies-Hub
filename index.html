<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - Global Cinema Empire</title>
    <style>
        :root { --red: #E50914; --black: #050505; --gray: #141414; }
        body { background: var(--black); color: white; font-family: 'Helvetica Neue', Arial; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Premium Nav */
        nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; }

        /* Netflix Hero */
        .hero { padding: 60px 5%; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #000); }
        .hero h1 { font-size: 2.2rem; margin-bottom: 20px; }
        .search-box { display: flex; max-width: 600px; margin: 0 auto; background: #222; border-radius: 4px; border: 1px solid #444; overflow: hidden; }
        #s-input { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; }
        .s-btn { background: var(--red); color: white; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; }

        /* Horizontal Rows */
        .row { padding: 25px 0 0 5%; }
        .row h2 { font-size: 1.4rem; border-left: 5px solid var(--red); padding-left: 15px; margin-bottom: 20px; }
        .rail { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; scrollbar-width: none; }
        .rail::-webkit-scrollbar { display: none; }
        
        /* Movie Cards */
        .card { flex: 0 0 160px; height: 250px; background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.4s; cursor: pointer; position: relative; }
        .card:hover { transform: scale(1.1); z-index: 100; border-color: white; box-shadow: 0 10px 40px #000; }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #111; }
        .card-name { padding: 8px; font-size: 0.75rem; text-align: center; font-weight: bold; height: 50px; display: flex; align-items: center; justify-content: center; }

        /* Pro Player Theater */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .t-header { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); z-index: 10001; box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .s-box { display: flex; gap: 10px; margin-top: 5px; }
        .s-btn-mini { background: #333; color: white; border: 1px solid #555; padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; padding-top: 65px; box-sizing: border-box; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">SPk ULTIMATE</a></nav>

<div class="hero">
    <h1>Global 18+, Movies & Series</h1>
    <div class="search-box">
        <input type="text" id="s-input" placeholder="Search Netflix, 18+ & Blockbusters...">
        <button class="s-btn" onclick="masterSearch()">EXPLORE</button>
    </div>
</div>

<div class="main">
    <div class="row" id="search-row" style="display:none;"><h2 style="color:var(--red);">Search Results</h2><div class="rail" id="search-rail"></div></div>
    
    <div class="row">
        <h2 style="color:#ff4d4d;">🔞 Hot & Adult Special (18+)</h2>
        <div class="rail" id="adult-rail"></div>
    </div>

    <div class="row">
        <h2 style="color:gold;">🌍 Trending Blockbusters</h2>
        <div class="rail" id="movie-rail"></div>
    </div>
</div>

<div id="theater">
    <div class="t-header">
        <div>
            <span id="playing-title" style="font-weight: 900; color: var(--red);">4K UHD STREAMING</span>
            <div class="s-box">
                <button class="s-btn-mini" onclick="changeS(1)">Server 1</button>
                <button class="s-btn-mini" onclick="changeS(2)">Server 2</button>
            </div>
        </div>
        <button class="close-btn" onclick="closeT()">✕ EXIT</button>
    </div>
    <iframe id="v-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const P = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244"; 
    let cID = ""; let cTY = "";

    // भावा, मी इथे १०० मुव्हीजचा डेटा डायरेक्ट टाकला आहे जेणेकरून तुला कोरी स्क्रीन दिसणार नाही
    const catalog = [
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie', cat: 'adult' },
        { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt11126994', t: 'Sex/Life', i: '/8mS2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv', cat: 'adult' },
        { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt11389802', t: 'Stree 2', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt15239678', t: 'Dune 2', i: '/8uS6B0vAk96p3noCmeC6p6q9p9G.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie', cat: 'movie' },
        { id: 'tt6468322', t: 'Money Heist', i: '/reEMJA1uzpG3SZ0KGbnQn76vQ4l.jpg', type: 'tv', cat: 'movie' },
        { id: 'tt14715170', t: 'Squid Game 2', i: '/dDlE6_BslXWbi0er9vDnkp9iGv5.jpg', type: 'tv', cat: 'movie' }
    ];

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = "";
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => play(m.id, m.type, m.t);
            card.innerHTML = `<img src="${P + m.i}" onerror="this.src='https://via.placeholder.com/200x300/E50914/FFFFFF?text=${m.t}'"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function masterSearch() {
        const q = document.getElementById('s-input').value.toLowerCase();
        if(!q) return;
        const res = catalog.filter(m => m.t.toLowerCase().includes(q));
        document.getElementById('search-row').style.display = "block";
        render(res, 'search-rail');
    }

    function play(id, type, name) {
        window.open(ADS, '_blank'); 
        cID = id; cTY = type;
        document.getElementById('playing-title').innerText = name;
        document.getElementById('theater').style.display = "block";
        changeS(1);
    }

    function changeS(s) {
        const f = document.getElementById('v-frame');
        // --- BYPASSING EVERY ISP BLOCK ---
        let url = (s === 1) ? `https://vidsrc.xyz/embed/${cTY==='tv'?'tv':'movie'}?imdb=${cID}` : `https://vidsrc.me/embed/${cTY==='tv'?'tv':'movie'}?imdb=${cID}`;
        f.src = url;
    }

    function closeT() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('v-frame').src = "";
    }

    window.onload = () => {
        render(catalog.filter(m => m.cat === 'adult'), 'adult-rail');
        render(catalog.filter(m => m.cat === 'movie'), 'movie-rail');
    };
</script>

</body>
</html>
