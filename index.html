<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPk ULTIMATE - VPN FREE STREAMING</title>
    <style>
        :root { --red: #E50914; --black: #080808; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--black); color: white; margin: 0; padding: 0; text-align: center; }
        nav { background: #000; padding: 15px; border-bottom: 3px solid var(--red); color: var(--red); font-size: 1.6rem; font-weight: 900; }
        .row { padding: 25px 5%; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        
        .card { background: #141414; border-radius: 10px; border: 1px solid #333; cursor: pointer; transition: 0.3s; overflow: hidden; position: relative; height: 260px; }
        .card:hover { transform: scale(1.05); border-color: var(--red); box-shadow: 0 0 15px var(--red); }
        .card img { width: 100%; height: 215px; object-fit: cover; background: #222; }
        .card-name { padding: 8px; font-size: 0.8rem; text-align: center; font-weight: bold; background: #000; height: 45px; display: flex; align-items: center; justify-content: center; }
        
        /* Premium Player Overlay */
        #theater { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .theater-nav { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); box-sizing: border-box; }
        .close-btn { background: var(--red); color: white; border: none; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<nav>SPk ULTIMATE</nav>

<div class="row">
    <h2 style="color: gold;">⭐ DHURANDHAR & TRENDING</h2>
    <div class="grid" id="main-grid"></div>
</div>

<div class="row">
    <h2 style="color: #ff4d4d;">🔥 HOT & ADULT</h2>
    <div class="grid" id="hot-grid"></div>
</div>

<div id="theater">
    <div class="theater-nav">
        <span id="m-title" style="font-weight:bold; color:var(--red);">4K STREAMING</span>
        <button class="close-btn" onclick="closeCinema()">✕ EXIT</button>
    </div>
    <iframe id="movie-frame" src="" allowfullscreen></iframe>
</div>

<script>
    const ADS = "https://narilyhukelpfulin.com/?2G2mF=1254244";
    // VPN-FREE IMAGE PROXY
    const IMG_PROXY = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w500";

    const movies = [
        { id: 'tt27712166', t: 'Dhurandhar', i: '/8X26ZzN87S7rK7P3f550Y8pYFzC.jpg', type: 'movie' },
        { id: 'tt8772262', t: 'Euphoria', i: '/j9S9Z9f89N0X9Ube5y.jpg', type: 'tv' },
        { id: 'tt16539488', t: 'Godzilla x Kong 2', i: '/v9998Zst7I79z27k31Jk5t9Mv0V.jpg', type: 'movie' },
        { id: 'tt11389802', t: 'Stree 3', i: '/6v8yX7D9YvDIn6mP7m0I07S67pE.jpg', type: 'movie' }
    ];

    const hot = [
        { id: 'tt10837166', t: '365 Days', i: '/6lyBWmC6FL87zy6FF6v6XpS6y.jpg', type: 'movie' },
        { id: 'tt13008596', t: 'Elite', i: '/37vF7S2G1l7t0OQp8t50S8tWUX.jpg', type: 'tv' },
        { id: 'tt13751694', t: 'Animal (Uncut)', i: '/vG9QOsl2G1l7t0OQp8t50S8tWUX.jpg', type: 'movie' }
    ];

    function render(data, gridId) {
        const grid = document.getElementById(gridId);
        data.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => playMovie(m.id, m.type, m.t);
            card.innerHTML = `<img src="${IMG_PROXY + m.i}" onerror="this.src='https://via.placeholder.com/200x300?text=${m.t}'"><div class="card-name">${m.t}</div>`;
            grid.appendChild(card);
        });
    }

    function playMovie(id, type, name) {
        // OPEN AD IN BACKGROUND (FOR DOLLARS)
        window.open(ADS, '_blank');
        
        // SHOW THEATER
        const theater = document.getElementById('theater');
        const frame = document.getElementById('movie-frame');
        document.getElementById('m-title').innerText = "PLAYING: " + name;

        // VPN-FREE PLAYER SERVERS (Trying Mirror 1)
        let playerUrl = (type === 'tv') ? `https://vidsrc.me/embed/tv?imdb=${id}` : `https://vidsrc.me/embed/movie?imdb=${id}`;
        
        frame.src = playerUrl;
        theater.style.display = "block";
    }

    function closeCinema() {
        document.getElementById('theater').style.display = "none";
        document.getElementById('movie-frame').src = "";
    }

    window.onload = () => { render(movies, 'main-grid'); render(hot, 'hot-grid'); };
</script>

</body>
</html>
